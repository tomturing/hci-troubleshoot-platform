name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "手动触发原因"
        required: false
        default: "手动构建镜像"

jobs:
  docs-governance:
    name: docs-governance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 检查关键改动是否同步文档
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # core.quotepath=false: 禁止 git 对非 ASCII 路径（中文文件名）做八进制转义加引号
          # 不加此参数时，中文路径输出为 "docs/\xxx\xxx.md"，行首是 " 而非 d，导致 grep ^docs/ 永远匹配不到
          CHANGED_FILES="$(git -c core.quotepath=false diff --name-only "$BASE_SHA" "$HEAD_SHA")"

          echo "本次 PR 改动文件:"
          echo "$CHANGED_FILES"

          if [[ -z "$CHANGED_FILES" ]]; then
            echo "无变更，跳过文档门禁"
            exit 0
          fi

          # 检查是否有除 .github/workflows/ 外的关键目录改动
          CORE_CHANGES="$(echo "$CHANGED_FILES" | grep -E '^(backend/|frontend/|deploy/|scripts/|database/)' || true)"

          if [[ -n "$CORE_CHANGES" ]]; then
            if echo "$CHANGED_FILES" | grep -Eq '^(docs/|README\.md$|AGENTS\.md$|CLAUDE\.md$)'; then
              echo "检测到关键改动且已同步文档，门禁通过"
              exit 0
            fi

            echo "检测到关键改动但未同步文档。"
            echo "请至少更新 docs/ 下相关文档，或更新 README.md/AGENTS.md/CLAUDE.md 中的说明。"
            exit 1
          fi

          echo "未检测到关键目录改动（workflow 配置变更无需文档同步），门禁通过"

          # 检查 pitfalls 条目文件改动是否同步更新了 _index.md（编号注册表）
          PITFALL_ENTRY=$(echo "$CHANGED_FILES" | grep -E '^docs/pitfalls/[^_]' || true)
          if [[ -n "$PITFALL_ENTRY" ]]; then
            if ! echo "$CHANGED_FILES" | grep -qE '^docs/pitfalls/_index\.md'; then
              echo "⚠️  修改了 docs/pitfalls/ 条目文件，但未同步更新 _index.md"
              echo "   请更新 _index.md 中的条目计数或 PIT 编号注册表，再提交"
              exit 1
            fi
            echo "pitfalls 条目与 _index.md 同步更新，门禁通过"
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 安装依赖
        run: uv sync --group dev

      - name: Ruff 代码检查
        run: uv run ruff check backend/ tests/

  frontend-build:
    name: 前端构建检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 安装前端依赖
        run: pnpm --dir frontend install --frozen-lockfile

      - name: 构建前端工作区
        run: pnpm --dir frontend -r build

  helm-validate:
    name: Helm 模板校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/hci-platform

      - name: Helm template 渲染检查
        run: |
          helm template hci-platform deploy/helm/hci-platform \
            -f deploy/helm/hci-platform/values.yaml \
            >/tmp/hci-platform-rendered.yaml

          if [ ! -s /tmp/hci-platform-rendered.yaml ]; then
            echo "Helm 渲染结果为空"
            exit 1
          fi

      # E-2: helm-unittest — 覆盖关键配置渲染场景
      - name: 安装 helm-unittest 插件（二进制方式）
        env:
          HELM_UNITTEST_VERSION: "v0.4.4"
        run: |
          PLUGINS_DIR="$(helm env HELM_PLUGINS)"
          mkdir -p "${PLUGINS_DIR}/helm-unittest"
          curl -sSL "https://github.com/helm-unittest/helm-unittest/releases/download/${HELM_UNITTEST_VERSION}/helm-unittest-linux-amd64-${HELM_UNITTEST_VERSION#v}.tgz" \
            | tar xz -C "${PLUGINS_DIR}/helm-unittest"
          helm plugin list | grep unittest

      - name: 运行 Helm Unit Tests
        run: |
          helm unittest deploy/helm/hci-platform --strict
          echo "✅ Helm Unit Tests 通过"

  check-claw-configs:
    name: 校验 claw-configs 一致性
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: 检查 deploy/claw-configs 与 Helm chart 副本是否同步
        run: |
          # 源文件：deploy/claw-configs/（人工编辑）
          # Helm 副本：deploy/helm/hci-platform/claw-configs/（由 make sync-claw-configs 更新）
          # 两者必须完全一致，否则 ConfigMap 渲染的 Personality 文件与源文件脱节
          if ! diff -rq deploy/claw-configs/learningclaw \
              deploy/helm/hci-platform/claw-configs/learningclaw; then
            echo "❌ learningclaw 配置不一致，请运行 make sync-claw-configs 后提交"
            exit 1
          fi
          if ! diff -rq deploy/claw-configs/productionclaw \
              deploy/helm/hci-platform/claw-configs/productionclaw; then
            echo "❌ productionclaw 配置不一致，请运行 make sync-claw-configs 后提交"
            exit 1
          fi
          echo "✅ claw-configs 与 Helm chart 副本一致"

  check-db-migrations-sync:
    name: 检查数据库迁移同步
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: 检查迁移文件是否已同步到 ConfigMap
        run: |
          chmod +x scripts/ci/check-db-migrations-sync.sh
          scripts/ci/check-db-migrations-sync.sh

  probe-alignment:
    name: Layer-2A 探针路径对齐检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Helm
        uses: azure/setup-helm@v4

      - name: 渲染 Helm chart 并检查探针路径对齐
        run: |
          helm template hci-platform deploy/helm/hci-platform \
            -f deploy/helm/hci-platform/values.yaml \
            > /tmp/rendered.yaml

          # 提取所有 liveness/readiness/startup probe 的 path 字段
          PROBE_PATHS=$(grep -A2 'httpGet:' /tmp/rendered.yaml \
            | grep 'path:' \
            | awk '{print $2}' \
            | sort -u)
          echo "Chart 中使用的探针路径："
          echo "${PROBE_PATHS}"

          # 对每个探针路径，检查后端代码是否存在对应路由定义
          ALL_OK=true
          for PROBE_PATH in ${PROBE_PATHS}; do
            if ! grep -rq "${PROBE_PATH}" backend/; then
              echo "❌ 探针路径 '${PROBE_PATH}' 在 backend/ 中未找到对应路由定义！"
              ALL_OK=false
            else
              echo "✓ 探针路径 '${PROBE_PATH}' 后端路由存在"
            fi
          done

          if [ "${ALL_OK}" = "false" ]; then
            echo ""
            echo "探针路径与后端路由不对齐！修改 Helm chart probe path 后必须确认后端已实现对应路由。"
            exit 1
          fi
          echo "✅ 所有探针路径均已在后端代码中找到对应路由"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: [lint, frontend-build, helm-validate, check-claw-configs, probe-alignment]
    if: always() && (needs.lint.result == 'success') && (needs.frontend-build.result == 'success') && (needs.helm-validate.result == 'success') && (needs.probe-alignment.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 安装依赖
        run: uv sync --group dev

      - name: 运行单元测试（含覆盖率）
        run: |
          # 各服务 app/ 包名相同，pytest 单进程 sys.modules 会跨服务污染
          # 分进程运行保证各自 sys.modules 隔离，--cov-append 合并覆盖率
          uv run pytest tests/unit/ \
            -x -q \
            --cov=backend --cov-report=xml --cov-report=term-missing \
            -m "not integration and not slow"
          uv run pytest backend/api-gateway/tests/unit/ \
            -x -q \
            --cov=backend --cov-report=xml --cov-report=term-missing --cov-append \
            -m "not integration and not slow"
          uv run pytest backend/case-service/tests/unit/ \
            -x -q \
            --cov=backend --cov-report=xml --cov-report=term-missing --cov-append \
            -m "not integration and not slow"
          uv run pytest backend/conversation-service/tests/unit/ \
            -x -q \
            --cov=backend --cov-report=xml --cov-report=term-missing --cov-append \
            -m "not integration and not slow"
          # 最后一批：合并所有覆盖率后统一检查基线（≥60%），避免分批检查造成误报
          uv run pytest backend/scheduler-service/tests/unit/ \
            -x -q \
            --cov=backend --cov-report=xml --cov-report=term-missing --cov-append \
            --cov-fail-under=60 \
            -m "not integration and not slow"

      - name: 上传覆盖率报告
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs: [lint, frontend-build, helm-validate, check-claw-configs, probe-alignment]
    if: always() && (needs.lint.result == 'success') && (needs.frontend-build.result == 'success') && (needs.helm-validate.result == 'success') && (needs.probe-alignment.result == 'success')

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 安装依赖
        run: uv sync --group dev

      - name: 运行集成测试
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          # 各服务分开进程运行，避免 app/ 命名空间跨服务污染
          uv run pytest tests/integration/ -x -q -m "integration"
          uv run pytest backend/conversation-service/tests/integration/ -x -q -m "integration"
          uv run pytest backend/scheduler-service/tests/integration/ -x -q -m "integration"
          uv run pytest backend/api-gateway/tests/integration/ -x -q -m "integration"

  security-tests:
    name: security-tests
    runs-on: ubuntu-latest
    needs: [lint, frontend-build, helm-validate, check-claw-configs, probe-alignment]
    if: always() && (needs.lint.result == 'success') && (needs.frontend-build.result == 'success') && (needs.helm-validate.result == 'success') && (needs.probe-alignment.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: 安装依赖
        run: uv sync --group dev

      - name: 运行 CORS 安全测试
        run: |
          uv run pytest tests/security/ -x -q -v

  release-metadata:
    name: 发布元数据产物
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    if: always() && (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && (needs.unit-tests.result == 'success') && (needs.integration-tests.result == 'success') && (needs.security-tests.result == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: 生成发布元数据
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          cat > release-metadata.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "commit_sha": "${GITHUB_SHA}",
            "short_sha": "${SHORT_SHA}",
            "build_time_utc": "${BUILD_TIME}",
            "workflow": "CI",
            "run_id": "${GITHUB_RUN_ID}",
            "run_number": "${GITHUB_RUN_NUMBER}"
          }
          EOF

      - name: 上传发布元数据
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata
          path: release-metadata.json

  # ─────────────────────────────────────────────────────────────────────────
  # Sprint 1 新增：镜像构建 + 安全扫描 + 自动晋级 dev（仅 main push 触发）
  # ─────────────────────────────────────────────────────────────────────────

  prepare:
    name: 准备构建元数据
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-tests]
    if: always() && (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && (needs.unit-tests.result == 'success') && (needs.integration-tests.result == 'success') && (needs.security-tests.result == 'success')
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: 生成唯一镜像标签（日期-时间-sha7）
        id: tag
        run: echo "tag=$(date -u +%Y%m%d-%H%M)-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  build-and-push:
    name: 构建并推送镜像（${{ matrix.service }}）
    runs-on: ubuntu-latest
    needs: prepare
    if: always() && needs.prepare.result == 'success' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: backend
            dockerfile: backend/api-gateway/Dockerfile
          - service: case-service
            context: backend
            dockerfile: backend/case-service/Dockerfile
          - service: conversation-service
            context: backend
            dockerfile: backend/conversation-service/Dockerfile
          - service: scheduler-service
            context: backend
            dockerfile: backend/scheduler-service/Dockerfile
          - service: kb-service
            context: backend
            dockerfile: backend/kb-service/Dockerfile
          - service: customer-ui
            context: frontend
            dockerfile: frontend/customer/Dockerfile
          - service: admin-ui
            context: frontend
            dockerfile: frontend/admin/Dockerfile
          # hci-openclaw 已从本 matrix 移出，由独立 workflow build-hci-openclaw.yml 管理
          # （仅 workflow_dispatch 手动触发，固定版本 v2026.3.24，不阻断主流程）
    steps:
      - uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.prepare.outputs.image_tag }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest

      - name: Trivy 镜像安全扫描（仅上报，不阻断）
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.prepare.outputs.image_tag }}
          exit-code: "0"
          severity: HIGH,CRITICAL
          format: sarif
          output: trivy-${{ matrix.service }}.sarif

      - name: 上传安全扫描结果（GitHub Security 标签页可见）
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif

  auto-deploy-non-prod:
    name: 自动晋级 dev/staging 环境
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push]
    if: always() && needs.prepare.result == 'success' && needs.build-and-push.result == 'success' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch')
    steps:
      - name: 触发环境仓库同步（dev 优先，串行执行）
        env:
          GH_TOKEN: ${{ secrets.ENV_REPO_PAT }}
        run: |
          # 串行执行环境同步，dev 优先
          # 每个环境同步完成后等待，确保 Git 推送完成，避免并发竞争
          # 详见 docs/solution/events/2026-04-07-环境同步串行化方案.md
          environments=("dev" "staging")

          for env in "${environments[@]}"; do
            echo "========== 触发 ${env} 环境同步 =========="
            gh workflow run env-repo-sync.yml \
              -R tomturing/hci-platform-env \
              -f env_repo_name=tomturing/hci-platform-env \
              -f target_env=${env} \
              -f image_tag="${{ needs.prepare.outputs.image_tag }}"

            # 等待 workflow 启动并完成 Git 推送（约 30 秒）
            echo "等待 ${env} 环境同步完成..."
            sleep 30

            # 输出最近一次同步状态
            echo "检查 ${env} 环境同步状态..."
            gh run list -R tomturing/hci-platform-env \
              --workflow env-repo-sync.yml \
              --limit 1 \
              --json conclusion,displayTitle
          done

          echo "✅ dev/staging 环境同步已触发（串行执行完成）"
