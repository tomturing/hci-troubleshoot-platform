name: Env Repo Sync

on:
  workflow_dispatch:
    inputs:
      env_repo_name:
        description: "环境仓库名（格式：owner/repo）"
        required: true
      target_env:
        description: "目标环境（dev/staging/prod）"
        required: true
        default: "dev"
      image_tag:
        description: "镜像标签"
        required: true
      services_csv:
        description: "服务列表（逗号分隔）"
        required: false
        default: "apiGateway,caseService,conversationService,schedulerService,kbService,customerUI,adminUI"

jobs:
  sync-env-repo:
    name: 同步环境仓库镜像标签
    runs-on: ubuntu-latest
    steps:
      - name: 校验输入参数
        run: |
          if [[ -z "${{ inputs.env_repo_name }}" ]]; then
            echo "env_repo_name 不能为空，格式应为 owner/repo"
            exit 1
          fi

      - name: Checkout 应用仓库
        uses: actions/checkout@v4

      - name: Checkout 环境仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.env_repo_name }}
          token: ${{ secrets.ENV_REPO_PAT }}
          path: env-repo

      - name: 同步镜像标签到环境仓库
        env:
          ENV_REPO_PATH: ${{ github.workspace }}/env-repo
          TARGET_ENV: ${{ inputs.target_env }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          SERVICES_CSV: ${{ inputs.services_csv }}
        run: bash scripts/ops/sync-env-repo-tags.sh

      - name: 创建环境仓库 PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ENV_REPO_PAT }}
          path: env-repo
          commit-message: "chore: 同步 ${{ inputs.target_env }} 环境镜像标签为 ${{ inputs.image_tag }}"
          title: "chore: 同步${{ inputs.target_env }}环境镜像标签 ${{ inputs.image_tag }}"
          body: |
            自动同步环境仓库镜像标签。

            - target_env: ${{ inputs.target_env }}
            - image_tag: ${{ inputs.image_tag }}
            - services_csv: ${{ inputs.services_csv }}

            请审核后合并。
          branch: chore/sync-${{ inputs.target_env }}-${{ inputs.image_tag }}
          base: main
