name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # 使用根目录 release-please-config.json
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # Release 创建后，同步打 tag 到环境仓库（可选，触发 staging 晋级）
  tag-staging:
    name: 通知 staging 晋级
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: 触发 staging 环境更新
        env:
          GH_TOKEN: ${{ secrets.ENV_REPO_PAT }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Release $TAG 已创建，可手动在环境仓库触发 staging 晋级"
          echo "release_tag=$TAG" >> $GITHUB_STEP_SUMMARY
