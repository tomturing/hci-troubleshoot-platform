name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          # 使用根目录 release-please-config.json
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # release-please 使用 GITHUB_TOKEN 创建 PR，不会触发其他 workflow（GitHub 安全机制）
  # 而 ruleset 要求 5 个状态检查通过才能合并
  # 由于发版 PR 仅修改版本文件（CHANGELOG/pyproject.toml），不含代码变更，
  # 直接标记必需检查为通过，避免 PR 永久卡住
  bypass-checks-for-release-pr:
    name: 发版 PR 状态检查旁路
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ !needs.release-please.outputs.release_created }}
    steps:
      - name: 标记必需状态检查为通过
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 查找带 autorelease: pending 标签的 PR 的 head SHA
          SHA=$(gh api repos/${{ github.repository }}/pulls \
            --jq '[.[] | select(.labels[].name == "autorelease: pending")][0].head.sha')

          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "未找到 release-please PR，跳过"
            exit 0
          fi

          echo "为 release-please PR (SHA: $SHA) 设置状态检查"
          for ctx in "Lint" "unit-tests" "security-tests" "integration-tests" "docs-governance"; do
            gh api repos/${{ github.repository }}/statuses/"$SHA" \
              -f state=success \
              -f context="$ctx" \
              -f description="已跳过：发版 PR 不含代码变更"
            echo "✓ $ctx → success"
          done

  # Release 创建后，同步打 tag 到环境仓库（可选，触发 staging 晋级）
  tag-staging:
    name: 通知 staging 晋级
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - name: 触发 staging 环境更新
        env:
          GH_TOKEN: ${{ secrets.ENV_REPO_PAT }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          echo "Release $TAG 已创建，可手动在环境仓库触发 staging 晋级"
          echo "release_tag=$TAG" >> $GITHUB_STEP_SUMMARY
