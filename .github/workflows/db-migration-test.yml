name: DB Migration Test

on:
  pull_request:
    branches: [main]
    paths:
      # 迁移文件变更时触发
      - "database/atlas-migrations/**"
      # schema 声明文件变更时触发
      - "database/desired_schema.sql"
      # Atlas 配置变更时触发
      - "atlas.hcl"
      # 迁移镜像 Dockerfile 变更时触发
      - "Dockerfile.migrations"

jobs:
  db-migration-test:
    name: DB 迁移质量验证
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: hci_test
          POSTGRES_PASSWORD: ci_test_pass
          POSTGRES_DB: hci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgres://hci_test:ci_test_pass@localhost:5432/hci_test?sslmode=disable"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ── Step 1: 安装 Atlas ────────────────────────────────────────────────
      - name: 安装 Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- -y
          atlas version

      # ── Step 2: Lint 检查（危险操作检测）────────────────────────────────
      # atlas migrate lint 检测以下危险操作：
      #   - 删除表（DROP TABLE）
      #   - 无默认值的 NOT NULL 列（会导致锁表）
      #   - 数据依赖删除（外键删除前）
      #   - 不可逆变更（无法 migrate down 的操作）
      - name: Atlas Migrate Lint（危险操作检测）
        run: |
          # 对比 base 分支检测本次 PR 新增的迁移文件中的危险操作
          # --git-base 指定对比基准，仅检查本次 PR 变更的迁移文件
          atlas migrate lint \
            --url "$DATABASE_URL" \
            --dir "file://database/atlas-migrations" \
            --git-base origin/${{ github.base_ref }} \
            --format '{{ range .Files }}{{ .Name }}: {{ .Error }}{{ end }}' \
          || {
            echo "❌ Atlas Lint 发现危险操作，请审查上述报告后修复再提交"
            exit 1
          }
          echo "✅ Atlas Lint 通过，无危险操作"

      # ── Step 3: 全量迁移执行验证 ─────────────────────────────────────────
      # 在全新 DB 上执行全部迁移文件（含 baseline），验证 SQL 语法和执行顺序
      - name: Atlas Migrate Apply（全量执行验证）
        run: |
          atlas migrate apply \
            --url "$DATABASE_URL" \
            --dir "file://database/atlas-migrations" \
            --allow-dirty
          echo "✅ 全量迁移执行成功"

      # ── Step 4: Schema 完整性验证 ─────────────────────────────────────────
      # 验证核心业务表存在，确保迁移没有遗漏关键表
      - name: Schema 完整性检查
        run: |
          # 安装 psql 客户端
          sudo apt-get install -q -y postgresql-client

          EXPECTED_TABLES=(
            "user"
            "customer"
            "case"
            "conversation"
            "message"
            "diagnostic_item"
            "tool_result"
            "audit_log"
            "system_prompt"
            "tool_definition"
            "kb_category"
            "kbd_entry"
            "sop_document"
            "sop_chunk"
            "environment"
            "assistant_evaluation"
            "atlas_schema_revisions"
          )

          MISSING=0
          for TABLE in "${EXPECTED_TABLES[@]}"; do
            COUNT=$(psql "$DATABASE_URL" -t -c \
              "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public' AND tablename='$TABLE';" \
              | tr -d '[:space:]')
            if [ "$COUNT" -eq "1" ]; then
              echo "  ✅ $TABLE"
            else
              echo "  ❌ $TABLE (缺失)"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "❌ 发现 $MISSING 张表缺失"
            exit 1
          fi
          echo "✅ 所有 ${#EXPECTED_TABLES[@]} 张表均存在"

      # ── Step 5: 幂等性验证（第二次执行应 0 变更）───────────────────────
      - name: 幂等性验证
        run: |
          RESULT=$(atlas migrate apply \
            --url "$DATABASE_URL" \
            --dir "file://database/atlas-migrations" \
            --allow-dirty 2>&1)
          echo "$RESULT"  

          # 第二次执行应该显示 "No migration files to execute" 或 0 文件执行
          if echo "$RESULT" | grep -q "no changes\|already at version\|0 files"; then
            echo "✅ 幂等性验证通过，第二次执行 0 变更"
          else
            # Atlas 幂等性：已执行的迁移不会重复执行，记录在 atlas_schema_revisions 中
            # 如果第二次有新的变更输出，则说明迁移不是幂等的
            MIGRATION_COUNT=$(echo "$RESULT" | grep -c "Migrating" || true)
            if [ "$MIGRATION_COUNT" -gt "0" ]; then
              echo "❌ 幂等性验证失败：第二次执行发现新的迁移（不应该有）"
              exit 1
            fi
            echo "✅ 幂等性验证通过"
          fi

      # ── Step 6: Atlas 版本追踪验证 ───────────────────────────────────────
      - name: 验证 atlas_schema_revisions 记录
        run: |
          REVISION_COUNT=$(psql "$DATABASE_URL" -t -c \
            "SELECT COUNT(*) FROM atlas_schema_revisions;" \
            | tr -d '[:space:]')
          echo "atlas_schema_revisions 记录数: $REVISION_COUNT"

          MIGRATION_FILE_COUNT=$(ls database/atlas-migrations/*.sql | wc -l | tr -d '[:space:]')
          echo "迁移文件数: $MIGRATION_FILE_COUNT"

          if [ "$REVISION_COUNT" -ne "$MIGRATION_FILE_COUNT" ]; then
            echo "❌ atlas_schema_revisions 记录数（$REVISION_COUNT）与迁移文件数（$MIGRATION_FILE_COUNT）不一致"
            exit 1
          fi
          echo "✅ 版本追踪完整，所有迁移已记录"
