name: DB Schema 声明式验证

on:
  pull_request:
    branches: [main]
    paths:
      # 表结构变更时触发（Atlas 管理）
      - "database/desired_schema.sql"
      # 函数/触发器变更时触发（psql 管理）
      - "database/desired_extras.sql"
      # 迁移镜像 Dockerfile 变更时触发
      - "Dockerfile.migrations"
      # 入口脚本变更时触发
      - "scripts/db-migrate.sh"

jobs:
  db-schema-declarative-test:
    name: Atlas 声明式 Schema 验证
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: hci_test
          POSTGRES_PASSWORD: ci_test_pass
          POSTGRES_DB: hci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgres://hci_test:ci_test_pass@localhost:5432/hci_test?sslmode=disable"
      # DEV_URL：独立空数据库，Atlas 用于规范化 Schema SQL
      DEV_URL: "postgres://hci_test:ci_test_pass@localhost:5432/atlas_dev?sslmode=disable"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: 安装 Atlas CLI + 准备 dev 数据库 ─────────────────────────
      - name: 安装 Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- -y
          atlas version

      - name: 准备 Atlas dev 数据库
        run: |
          # 创建独立的 Atlas dev 数据库（Atlas 用于规范化 DDL，需与目标库同版本）
          psql "$DATABASE_URL" -c "CREATE DATABASE atlas_dev;"
          # 安装必要 extensions（desired_schema.sql 使用 vector 类型）
          psql "$DEV_URL" -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
          "
          echo "✅ atlas_dev 准备完成"

      # ── Step 2: 危险变更静态检测 ──────────────────────────────────────────
      # 声明式 Schema 里不需要手写 DROP TABLE，Atlas 自动处理废弃表
      # 本步检测开发者是否误写了危险语句 / ADD COLUMN NOT NULL 无 DEFAULT
      - name: 危险操作检测
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            -- database/desired_schema.sql 2>/dev/null || true)

          if [ -z "$CHANGED" ]; then
            echo "✅ desired_schema.sql 未变更，跳过危险操作检测"
            exit 0
          fi

          DIFF_LINES=$(git diff origin/${{ github.base_ref }}...HEAD \
            -- database/desired_schema.sql \
            | grep '^+' | grep -v '^+++' || true)

          FOUND=0
          # DROP TABLE 不应出现在声明式 schema 文件中（由 Atlas 自动生成 diff）
          if echo "$DIFF_LINES" | grep -qiE '^\+\s*DROP\s+TABLE\b'; then
            echo "⚠️  检测到 DROP TABLE —— 声明式 Schema 中无需手写，Atlas 自动计算 diff"
            FOUND=1
          fi
          # TRUNCATE 是破坏性操作
          if echo "$DIFF_LINES" | grep -qiE '^\+\s*TRUNCATE\b'; then
            echo "⚠️  检测到 TRUNCATE —— 请确认不会清空生产数据"
            FOUND=1
          fi
          # ADD COLUMN NOT NULL 无 DEFAULT 会锁全表
          # 逐行匹配：仅当同一行既有 ADD COLUMN + NOT NULL 又缺少 DEFAULT 时报警
          if echo "$DIFF_LINES" | grep -iE '^\+.*\bADD\s+COLUMN\b.*\bNOT\s+NULL\b' \
            | grep -qviE '\bDEFAULT\b'; then
            echo "⚠️  疑似检测到 ADD COLUMN NOT NULL 无 DEFAULT —— 会锁全表，建议分步添加"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo "❌ 检测到危险操作，请在 PR 说明中注明原因后再合并"
            exit 1
          fi
          echo "✅ 危险操作检测通过"

      # ── Step 3: 声明式 Schema 全量应用 ───────────────────────────────────
      # 与 db-migrate.sh 完全相同的三步流程
      - name: 全量迁移（函数 → Atlas → 触发器）
        run: |
          echo ">>> Step 3a: 应用函数"
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/desired_extras.sql

          echo ">>> Step 3b: Atlas schema apply"
          atlas schema apply \
            --url "$DATABASE_URL" \
            --to "file://database/desired_schema.sql" \
            --dev-url "$DEV_URL" \
            --exclude "schema_migrations,alembic_version,atlas_schema_revisions" \
            --auto-approve

          echo ">>> Step 3c: 应用触发器"
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/desired_extras.sql
          echo "✅ Schema 全量应用成功"

      # ── Step 4: Schema 完整性验证 ─────────────────────────────────────────
      # 验证 17 张业务表存在，7 张废弃表未被创建
      - name: Schema 完整性检查
        run: |
          sudo apt-get install -q -y postgresql-client

          EXPECTED_TABLES=(
            "user" "customer" "case" "conversation" "message"
            "diagnostic_item" "tool_result" "audit_log" "session"
            "system_prompt" "tool_definition" "kb_category"
            "kbd_entry" "sop_document" "sop_chunk"
            "environment" "assistant_evaluation"
          )
          DEPRECATED_TABLES=(
            "kb_chunk" "kb_document" "kb_sop_node" "kb_synonym"
            "raw_cases" "knowledge_atoms" "prompt_audit"
          )

          MISSING=0
          for TABLE in "${EXPECTED_TABLES[@]}"; do
            COUNT=$(psql "$DATABASE_URL" -t -c \
              "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public' AND tablename='$TABLE';" \
              | tr -d '[:space:]')
            if [ "$COUNT" -eq "1" ]; then
              echo "  ✅ $TABLE"
            else
              echo "  ❌ $TABLE（缺失）"
              MISSING=$((MISSING + 1))
            fi
          done

          for TABLE in "${DEPRECATED_TABLES[@]}"; do
            COUNT=$(psql "$DATABASE_URL" -t -c \
              "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public' AND tablename='$TABLE';" \
              | tr -d '[:space:]')
            if [ "$COUNT" -eq "0" ]; then
              echo "  ✅ $TABLE（正确：废弃表未创建）"
            else
              echo "  ❌ $TABLE（废弃表意外存在）"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "❌ Schema 完整性检查失败（$MISSING 项异常）"
            exit 1
          fi
          echo "✅ 所有 ${#EXPECTED_TABLES[@]} 张业务表正确，${#DEPRECATED_TABLES[@]} 张废弃表未创建"

      # ── Step 5: 幂等性验证 ────────────────────────────────────────────────
      # atlas schema diff 输出为空 → 当前 DB 与期望 Schema 完全一致 → 幂等
      - name: 幂等性验证（atlas schema diff）
        run: |
          DIFF=$(atlas schema diff \
            --from "$DATABASE_URL" \
            --to "file://database/desired_schema.sql" \
            --dev-url "$DEV_URL" \
            --exclude "schema_migrations,alembic_version,atlas_schema_revisions" \
            2>&1 || true)

          if [ -z "$DIFF" ] || echo "$DIFF" | grep -q "Schemas are synced"; then
            echo "✅ 幂等性验证通过：DB 与期望 Schema 完全一致，无待变更项"
          else
            echo "❌ 幂等性验证失败：apply 后仍存在 diff："
            echo "$DIFF"
            exit 1
          fi
