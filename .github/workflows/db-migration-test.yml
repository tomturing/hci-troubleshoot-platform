name: DB Schema 声明式验证

on:
  pull_request:
    branches: [main]
    paths:
      # 表结构变更时触发（Atlas 管理）
      - "database/desired_schema.sql"
      # 函数/触发器变更时触发（psql 管理）
      - "database/desired_extras.sql"
      # 迁移镜像 Dockerfile 变更时触发
      - "Dockerfile.migrations"
      # 入口脚本变更时触发
      - "scripts/db-migrate.sh"

jobs:
  db-schema-declarative-test:
    name: Atlas 声明式 Schema 验证
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: hci_test
          POSTGRES_PASSWORD: ci_test_pass
          POSTGRES_DB: hci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgres://hci_test:ci_test_pass@localhost:5432/hci_test?sslmode=disable"
      # DEV_URL：独立空数据库，Atlas 用于规范化 Schema SQL
      DEV_URL: "postgres://hci_test:ci_test_pass@localhost:5432/atlas_dev?sslmode=disable"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Step 1: 安装 Atlas CLI + 准备 dev 数据库 ─────────────────────────
      - name: 安装 Atlas CLI
        run: |
          curl -sSf https://atlasgo.sh | sh -s -- -y
          atlas version

      - name: 准备 Atlas dev 数据库
        run: |
          # 创建独立的 Atlas dev 数据库（Atlas 用于规范化 DDL，需与目标库同版本）
          psql "$DATABASE_URL" -c "CREATE DATABASE atlas_dev;"
          # 两个数据库都需要安装 extensions（desired_schema.sql 使用 vector 类型）
          # hci_test（主库）：Atlas apply 时实际执行建表，需要 vector 类型
          # atlas_dev（dev库）：Atlas 规范化 DDL 时也需要 vector 类型
          for DB_URL in "$DATABASE_URL" "$DEV_URL"; do
            psql "$DB_URL" -c "
              CREATE EXTENSION IF NOT EXISTS vector;
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
              CREATE EXTENSION IF NOT EXISTS pg_trgm;
            "
          done
          echo "✅ hci_test 和 atlas_dev 扩展安装完成"

      # ── Step 2: 声明式 Schema 全量应用 ───────────────────────────────────
      # 与 db-migrate.sh 完全相同的三步流程（函数 → Atlas apply → 触发器）
      - name: 全量迁移（函数 → Atlas → 触发器）
        run: |
          echo ">>> Step 2a: 应用函数"
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/desired_extras.sql

          echo ">>> Step 2b: Atlas schema apply"
          atlas schema apply \
            --url "$DATABASE_URL" \
            --to "file://database/desired_schema.sql" \
            --dev-url "$DEV_URL" \
            --exclude "schema_migrations,alembic_version,atlas_schema_revisions" \
            --auto-approve

          echo ">>> Step 2c: 应用触发器"
          psql -v ON_ERROR_STOP=1 "$DATABASE_URL" -f database/desired_extras.sql
          echo "✅ Schema 全量应用成功"

      # ── Step 3: Schema 完整性验证 ─────────────────────────────────────────
      # 验证 17 张业务表存在，7 张废弃表未被创建
      - name: Schema 完整性检查
        run: |
          EXPECTED_TABLES=(
            "user" "customer" "case" "conversation" "message"
            "diagnostic_item" "tool_result" "audit_log" "session"
            "system_prompt" "tool_definition" "kb_category"
            "kbd_entry" "sop_document" "sop_chunk"
            "environment" "assistant_evaluation"
          )
          DEPRECATED_TABLES=(
            "kb_chunk" "kb_document" "kb_sop_node" "kb_synonym"
            "raw_cases" "knowledge_atoms" "prompt_audit"
          )

          MISSING=0
          for TABLE in "${EXPECTED_TABLES[@]}"; do
            COUNT=$(psql "$DATABASE_URL" -t -c \
              "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public' AND tablename='$TABLE';" \
              | tr -d '[:space:]')
            if [ "$COUNT" -eq "1" ]; then
              echo "  ✅ $TABLE"
            else
              echo "  ❌ $TABLE（缺失）"
              MISSING=$((MISSING + 1))
            fi
          done

          for TABLE in "${DEPRECATED_TABLES[@]}"; do
            COUNT=$(psql "$DATABASE_URL" -t -c \
              "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public' AND tablename='$TABLE';" \
              | tr -d '[:space:]')
            if [ "$COUNT" -eq "0" ]; then
              echo "  ✅ $TABLE（正确：废弃表未创建）"
            else
              echo "  ❌ $TABLE（废弃表意外存在）"
              MISSING=$((MISSING + 1))
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "❌ Schema 完整性检查失败（$MISSING 项异常）"
            exit 1
          fi
          echo "✅ 所有 ${#EXPECTED_TABLES[@]} 张业务表正确，${#DEPRECATED_TABLES[@]} 张废弃表未创建"

      # ── Step 4: 幂等性验证 ────────────────────────────────────────────────
      # atlas schema diff 输出为空 → 当前 DB 与期望 Schema 完全一致 → 幂等
      - name: 幂等性验证（atlas schema diff）
        run: |
          # atlas schema apply 使用 --dev-url 时会 DROP SCHEMA public CASCADE 清空 atlas_dev，
          # 导致 pgvector 注册在 public schema 的类型对象丢失（扩展条目仍在但类型消失）。
          # 重建 atlas_dev 数据库是最可靠的恢复方式。
          psql "$DATABASE_URL" -c "DROP DATABASE atlas_dev;"
          psql "$DATABASE_URL" -c "CREATE DATABASE atlas_dev;"
          psql "$DEV_URL" -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
          "

          DIFF=$(atlas schema diff \
            --from "$DATABASE_URL" \
            --to "file://database/desired_schema.sql" \
            --dev-url "$DEV_URL" \
            --exclude "schema_migrations,alembic_version,atlas_schema_revisions" \
            2>&1 || true)

          if [ -z "$DIFF" ] || echo "$DIFF" | grep -q "Schemas are synced"; then
            echo "✅ 幂等性验证通过：DB 与期望 Schema 完全一致，无待变更项"
          else
            echo "❌ 幂等性验证失败：apply 后仍存在 diff："
            echo "$DIFF"
            exit 1
          fi
