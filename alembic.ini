# =============================================================================
# Alembic 数据库迁移配置
# =============================================================================
# 使用方式：
#   export DATABASE_URL=postgresql+asyncpg://user:pass@localhost:5432/hci_troubleshoot
#   uv run alembic upgrade head       # 应用所有待执行迁移
#   uv run alembic revision --autogenerate -m "描述"  # 根据模型变化生成新迁移
#   uv run alembic history            # 查看迁移历史
#   uv run alembic current            # 查看当前版本
#   uv run alembic downgrade -1       # 回滚一个版本
# =============================================================================

[alembic]
script_location = backend/shared/migrations

# 数据库连接从环境变量 DATABASE_URL 注入（见 migrations/env.py）
# 本地开发默认值：postgresql+asyncpg://hci_admin:dev_password_123@localhost:5432/hci_troubleshoot
sqlalchemy.url =

file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
