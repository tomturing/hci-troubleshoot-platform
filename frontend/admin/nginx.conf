server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # admin-ui 挂在 /admin/ 子路径下（Traefik 不剥离前缀）
    # alias 将 /admin/* 映射到文件系统 /usr/share/nginx/html/*
    # vite base='/admin/' 使得 assets 引用为 /admin/assets/*，同样命中此 location
    location /admin/ {
        alias /usr/share/nginx/html/;
        index index.html;
        # HTML 不缓存，防止路由变更后浏览器使用旧版本
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        # SPA fallback：内部重定向到 /index.html，由下方 location / 最终处理
        try_files $uri $uri/ /index.html;
    }

    # /admin 不带斜线 → 301 重定向
    location = /admin {
        return 301 /admin/;
    }

    # 根路径：健康检查（kube-probe GET /）和 SPA fallback 最终落点
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # API 代理到 gateway
    location /api/ {
        proxy_pass http://api-gateway:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;
}
