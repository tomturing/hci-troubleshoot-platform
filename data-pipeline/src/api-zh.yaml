    /janus/20180725/links/action:
      post:
        description: "#### 场景: 创建设备连线或取消设备连线  \n#### 支持调用的角色: 超级管理员、系统管理员、租户以及拥有网络配置权限的协管员  \n#### 支持版本: SCP6.3.80及以上版本（取消设备连线）  \n#### 注解: 1.设备为物理出口时，vif的值为查询经典网络物理出口列表中的vlan_group.id 2.设备为云主机或NFV时，vif的值为net0,net1,net2...netn 3.设备为路由器时，vif的值为查询经典网络路由器列表接口响应参数中的vifs中的id参数 4.设备为交换机时，不用传vif参数\n"
