    "/janus/20180725/metrics/{object_id}":
      get:
        description: "#### 场景: 查询监控数据信息\n#### 支持调用的角色: 超级管理员、系统管理员、租户以及拥有监控读权限的协管员\n#### 支持版本: SCP6.3.83及以上版本\n#### 注解: timegap参数说明：timegap是以stop_time为结束时间，查询timegap时间范围内的监控数据。granularity参数说明：查询范围小于等于1小时，最小精度为60s；查询范围大于1小时，小于等于24小时（1d），最小精度为300s；查询范围大于24小时（1d），小于等于30d，最小精度为1800s；查询范围大于30d，最小精度为43200s。project_id参数说明：当资源类型为对象存储时，租户ID为必传参数。\n"
        operationId: getMetrics2018
        parameters:
          -
                          description: 资源ID，如云主机ID
                          example: host-001b21d61e70
                          in: path
                          name: object_id
                          required: true
                          schema:
                            type: string
          -
                          description: 资源类型
                          example: host
                          in: query
                          name: object_type
                          required: true
                          schema:
                            type: string
          -
                          description: 测量项，可以传入多个，以逗号分隔
                          example: "cpu.util,memory.util"
                          in: query
                          name: metric_names
                          required: true
                          schema:
                            type: string
          -
                          description: 查询的时间范围，默认单位为秒，同时也支持h，d 为单位查询。不传入默认返回1h范围
                          example: "1h"
                          in: query
                          name: timegap
                          required: true
                          schema:
                            type: string
          -
                          description: 结束时间，不传默认是最新时间
                          example: "2021-07-09T12:00:00Z"
                          in: query
                          name: stop_time
                          required: false
                          schema:
                            format: date-time
                            type: string
          -
                          description: 期望精度，默认单位为秒，支持h，d，不传默认后台自动匹配
                          example: 2400
                          in: query
                          name: granularity
                          required: false
                          schema:
                            type: string
          -
                          description: 租户ID(对象存储资源类型特有参数）
                          example: project-12345
                          in: query
                          name: project_id
                          required: false
                          schema:
                            type: string
        responses:
          "200":
            content:
              application/json:
                examples:
                  success:
                    value:
                      code: 0
                      data:
                        cpu.util:
                          datapoints:
                            -
                                                              - "2021-07-08T22:02:00"
                                                              - 54.04658832998283
                            -
                                                              - "2021-07-08T22:42:00"
                                                              - 50.29759119906204
                          granularity: 2400
                          unit: "%"
                        memory.util:
                          datapoints:
                            -
                                                              - "2021-07-08T22:02:00"
                                                              - 83.34465662319634
                            -
                                                              - "2021-07-08T22:42:00"
                                                              - 79.3979321365798
                          granularity: 2400
                          unit: "%"
                      message: ""
                schema:
                  allOf:
                    -
                                              $ref: "#/components/schemas/BaseResponseV1"
                    -
                                              properties:
                                                data:
                                                  $ref: "#/components/schemas/MetricsResponse2018"
                                              type: object
            description: 成功查询监控数据
          "400":
            $ref: "#/components/responsesV1/400"
          "403":
            $ref: "#/components/responsesV1/403"
          "404":
            $ref: "#/components/responsesV1/404"
          "500":
            $ref: "#/components/responsesV1/500"
        security:
          -
                          EC2Auth: []
          -
                          TokenAuth: []
        summary: 查询SCP监控数据信息
        tags:         - 监控管理
