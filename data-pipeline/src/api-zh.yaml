  components:
    parameters:
      BannerAlertCategoryParam:
        description: 横幅告警类别，用于指定告警的来源。
        in: query
        name: alert_category
        required: false
        schema:
          $ref: "#/components/schemas/BannerAlertCategory"
      BannerAlertTypeParam:
        description: 横幅告警类型，用于指定告警的种类。
        in: query
        name: alert_type
        required: false
        schema:
          $ref: "#/components/schemas/BannerAlertType"
      ContentType:
        description: 请求的报文类型，默认为application/json
        in: header
        name: Content-Type
        required: true
        schema:
          default: application/json
          enum:           - application/json
          type: string
      Fields:
        description: "期望字段，格式：fields=field1[,field2]，示例：fields=server_id,status"
        in: query
        name: fields
        required: false
        schema:
          type: string
      OrderBy:
        description: 排序方式，格式：ASC（默认），DESC，示例：ASC，DESC
        in: query
        name: order_by
        required: false
        schema:
          default: ASC
          enum:           - ASC
          - DESC
          type: string
      PageNum:
        description: 请求页数，默认为0
        in: query
        name: page_num
        required: false
        schema:
          default: 0
          type: integer
      PageSize:
        description: 页面大小，默认为100，最大为100
        in: query
        name: page_size
        required: false
        schema:
          default: 100
          maximum: 100
          type: integer
      Sort:
        description: "排序字段，格式：sort=field1[,field2]，示例：sort=cup_ratio,mem_ratio"
        in: query
        name: sort
        required: false
        schema:
          type: string
      XAmzDate:
        description: "请求当前时间，可用于校验签名，格式为ISO8601时间格式：\"2020-12-01T03:17:42Z\""
        in: header
        name: X-Amz-Date
        required: false
        schema:
          format: date-time
          type: string
      XClientToken:
        description: "幂等性令牌。用于janus开头的POST和PUT接口实现15分钟内有效的幂等性校验。\n建议使用UUID4生成随机数。\n"
        in: header
        name: X-Client-Token
        required: false
        schema:
          format: uuid
          type: string
    responsesV1:
      "400":
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponseV1"
        description: 参数错误或资源所需依赖不正确
      "401":
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponseV1"
        description: 未认证
      "403":
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponseV1"
        description: 权限不足
      "404":
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorResponseV1"
        description: 资源未找到
      "409":
        content:
          application/json:
