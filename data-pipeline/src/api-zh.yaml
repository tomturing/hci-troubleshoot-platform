  info:
    title: Sangfor Cloud APIs
    version: "6.11.1"
  openapi: "3.0.0"
  paths:
    "/janus/20180725/accelerators/azs/{az_id}/gpu":
      get:
        description: "#### 场景: 查询资源池GPU  \n#### 支持调用的角色: 超级管理员、系统管理员  \n#### 支持版本: SCP6.9.0及以上版本\n#### 注解: host_ip参数支持IPv4和IPv6\n"
        operationId: getGpuList
        parameters:
          -
                          $ref: "#/components/parameters/ContentType"
          -
                          $ref: "#/components/parameters/XAmzDate"
          -
                          $ref: "#/components/parameters/XClientToken"
          -
                          description: 资源池id
                          example: "4cf079ab-2d6f-4a7a-84fd-1c85644c6ba7"
                          in: path
                          name: az_id
                          required: true
                          schema:
                            type: string
          -
                          description: 物理主机ip
                          example: "10.102.48.145"
                          in: query
                          name: host_ip
                          required: false
                          schema:
                            type: string
          -
                          $ref: "#/components/parameters/PageNum"
          -
                          $ref: "#/components/parameters/PageSize"
          -
                          $ref: "#/components/parameters/Sort"
          -
                          $ref: "#/components/parameters/OrderBy"
          -
                          $ref: "#/components/parameters/Fields"
        responses:
          "200":
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/GpuListResponse"
            description: 成功响应
          "400":
            $ref: "#/components/responsesV1/400"
          "403":
            $ref: "#/components/responsesV1/403"
          "500":
            $ref: "#/components/responsesV1/500"
        security:
          -
                          EC2Auth: []
