                  summary: 取消设备连线
                  value:
                    action: delete
                    dst:
                      device_id: "00d3c312-16a7-4190-8cec-fdea86b4402b"
                      vif: net0
                    src:
                      device_id: "1bd17520-6155-4faa-af9d-0831d9fc0e9b"
                      vif: net0
              schema:
                $ref: "#/components/schemas/DeviceLinkActionRequest"
          required: true
        responses:
          "201":
            content:
              application/json:
                example:
                  code: 0
                  data:
                    dst:
                      device_id: "00d3c312-16a7-4190-8cec-fdea86b4402b"
                      vif: net0
                    src:
                      device_id: "1bd17520-6155-4faa-af9d-0831d9fc0e9b"
                      vif: net0
                  message: ""
                schema:
                  allOf:
                    -
                                              $ref: "#/components/schemas/BaseResponseV1"
                    -
                                              properties:
                                                data:
                                                  $ref: "#/components/schemas/CreateDeviceLinkResponse"
                                              type: object
