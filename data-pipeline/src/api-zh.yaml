            $ref: "#/components/responsesV2/400"
          "403":
            $ref: "#/components/responsesV2/403"
          "404":
            $ref: "#/components/responsesV2/404"
          "500":
            $ref: "#/components/responsesV2/500"
        security:
          -
                          EC2Auth: []
          -
                          TokenAuth: []
        summary: 设置补丁服务的代理配置
        tags:         - 补丁管理
