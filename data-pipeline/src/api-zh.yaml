                        type: integer
                      force:
                        description: 是否强制覆盖原有集群代理配置。0：否（默认）；1：是
                        example: 1
                        type: integer
                    type: object
                  proxy:
                    description: 代理配置设置
                    properties:
                      agent:
                        properties:
                          address:
                            description: 代理服务器地址
                            example: "http://10.130.130.10:3128"
                            type: string
                          mode:
                            description: 代理模式
                            example: 1
                            type: integer
                          password:
                            description: 代理密码
                            example: "90a2fd5a80f86ffe6a80d08..."
                            type: string
                          username:
                            description: 代理用户名
                            example: admin
                            type: string
                        type: object
                      enable:
                        description: 是否启用代理
                        example: 1
                        type: integer
                    type: object
                type: object
