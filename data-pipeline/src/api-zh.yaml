      VMDiskAllocationMethod:
        description: 云主机虚拟磁盘在存储上的空间分配方式
        enum:         - false
        - FULL
        - METADATA
        type: string
        x-enum-descriptions:
          FULL: "预分配方式指虚拟磁盘在创建时在存储上分配它全部的存储空间，在虚拟磁盘使\n用过程中不需要再分配空间。优点是虚拟磁盘在使用过程中的写性比其他分配方\n式高。缺点时在创建初期就占用大量的存储空间，即使虚拟磁盘里没有一个文件\n也需要占用虚拟存储大小的存储空间。\n"
          METADATA: "动态分配方式指虚拟磁盘在创建时在存储上分配部分空间，在虚拟磁盘使用过程\n中按需要进行分配空间。这个分配方式是精简分配方式和预分配方式的折中分配\n方式。因为已经分配了部分空间，所以这部分空间还没写完的时候进行写操作，\n写的性能是和预分配一样的，但是当这部分空间使用完再进行写操作时，需要动\n态进行空间分配，此时写的性能和精简分配一样。优点是在创建初期可以一定程\n度节省存储的空间占用，在使用初期写的性能也能得到一个保障。缺点是预先分\n配的部分空间使用完后，写性能和精简分配一样。\n"
          "false": "精简分配方式指虚拟磁盘在创建时在存储上没有分配它的存储空间，在虚拟磁盘\n使用过程中按需要进行分配空间。优点是在创建初期可以最大程度节省存储的空\n间占用。缺点是虚拟磁盘在使用过程中的写性能没有其他分配方式高。在虚拟磁\n盘内部将磁盘全部写满后的效果和预分配方式一样。\n"
