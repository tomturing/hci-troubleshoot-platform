      get:
        description: "#### 场景: 查询监控数据信息\n#### 支持调用的角色: 超级管理员、系统管理员、租户以及具有\"sdk：查询监控数据\"权限的协管员\n#### 支持版本: SCP6.10.0及以上版本\n#### 注解: 2018版本查询监控数据信息的源数据来自于SCP趋势图，而2019版本的源数据来自于HCI，所以相比于2018，2019版本的返回结构发生了变化。当查询资源ID为虚拟存储时，如果timegap为hour实际返回的为最近4小时数据。虚拟存储支持timegap为hour，day，week，custom。其他存储支持timegap为hour，day，month(hci6.7.0及以上版本支持）。只支持虚拟存储指定metric_name为io.latency，其他存储的速率单位统一转为Bps。\n"
        operationId: getMetrics2019
        parameters:
          -
                          description: 资源ID（暂只支持存储ID)
                          example: "366f93964be5f431fbecOaf5c50c62053"
                          in: path
                          name: object_id
                          required: true
                          schema:
                            type: string
          -
                          description: 资源类型
                          example: storage
                          in: query
                          name: object_type
                          required: true
                          schema:
                            enum:                 - storage
                            type: string
          -
                          description: 测量项(只支持单个)
                          example: io.speed
                          in: query
                          name: metric_name
                          required: true
                          schema:
                            enum:                 - io.iops
                            - io.speed
                            - io.latency
                            type: string
          -
                          description: 查询的时间范围
                          example: hour
                          in: query
                          name: timegap
                          required: true
                          schema:
                            enum:                 - custom
                            - hour
                            - day
                            - week
                            - month
                            type: string
          -
                          description: 结束时间，不传默认是最新时间，格式为时间戳
