      MetricName:
        description: "测量项名称，根据资源类型不同可选值不同：\n\n### eip / eip_tenant (弹性IP)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| eip.send.speed   | 弹性IP的发送速率      |\n| eip.recv.speed   | 弹性IP的接收速率      |\n\n### eip_flow (弹性IP流量)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| eip.in.packet    | 弹性IP下载流量        |\n| eip.out.packet   | 弹性IP上传流量        |\n\n### eip_pool (弹性IP池)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| eip.recv.speed   | 弹性IP池的接收速率    |\n| eip.send.speed   | 弹性IP池的发送速率    |\n\n### sbw (共享带宽)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| sbw.send.speed   | 共享带宽发送速率      |\n| sbw.recv.speed   | 共享带宽接收速率      |\n\n### sbw_flow (共享带宽流量)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| sbw.in.packet    | 共享带宽下载流量      |\n| sbw.out.packet   | 共享带宽上传流量      |\n\n### host / server (物理主机/云主机)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| cpu.util         | CPU使用率             |\n| memory.util      | 内存使用率            |\n| io.read.iops     | IO读次数              |\n| io.write.iops    | IO写次数              |\n| io.read.speed    | IO读速率              |\n| io.write.speed   | IO写速率              |\n| net.in.bps       | 接收流速              |\n| net.out.bps      | 发送流速              |\n| net.in.pps       | 包接收速率            |\n| net.out.pps      | 包发送速率            |\n\n### scale_group (弹性伸缩组)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| num.util         | 个数                  |\n| cpu.util         | CPU使用率             |\n| memory.util      | 内存使用率            |\n| io.read.iops     | IO读次数              |\n| io.write.iops    | IO写次数              |\n| io.read.speed    | IO读速率              |\n| io.write.speed   | IO写速率              |\n| net.in.bps       | 接收流速              |\n| net.out.bps      | 发送流速              |\n| net.in.pps       | 包接收速率            |\n| net.out.pps      | 包发送速率            |\n\n### az (资源池)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| cpu.util         | CPU使用率             |\n| memory.util      | 内存使用率            |\n| disk.util        | 存储使用率            |\n\n### disaster (容灾)\n| metric_names       | 描述                    |\n|--------------------|-------------------------|\n| site.status.bool   | 容灾站点状态            |\n| site.in.bps        | 容灾站点接收流速        |\n| site.out.bps       | 容灾站点发送流速        |\n\n### oss (对象存储)\n| metric_names     | 描述                  |\n|------------------|-----------------------|\n| bytes.received   | 外网流入流量          |\n| bytes.sent       | 外网流出流量          |\n| api.ops          | API接口调用次数        |"
        type: string
