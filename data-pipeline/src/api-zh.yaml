      get:
        description: "#### 场景: 获取公钥模数\n#### 支持调用的角色: 任意角色\n#### 支持版本: 6.3.0及以上版本\n#### 注解: 该公钥模数用于认证时用户密码加密、创建云主机时的云主机密码加密等涉及需要传递密码数据的情形。公钥模数为免密接口，请求头中只需要携带符合要求的Cookie信息即可获得对应的数据。返回的公钥模数字符串末尾包含\n，使用时需要去掉\n。\n"
        operationId: getPublicKey
        responses:
          "200":
            content:
              application/json:
                example:
                  code: 0
                  data:
                    public_key: 
                  message: ""
                schema:
                  allOf:
                    -
                                              $ref: "#/components/schemas/BaseResponseV1"
                    -
                                              properties:
                                                data:
                                                  properties:
                                                    public_key:
                                                      description: 公钥模数
                                                      type: string
                                                  type: object
                  type: object
            description: 成功响应
          "400":
            $ref: "#/components/responsesV1/400"
          "403":
            $ref: "#/components/responsesV1/403"
          "404":
            $ref: "#/components/responsesV1/404"
          "500":
            $ref: "#/components/responsesV1/500"
        summary: 获取公钥模数
        tags:         - 系统管理
    /janus/v2/public-key:
      get:
        description: "#### 场景: 获取公钥模数-v2\n#### 支持调用的角色: 任意角色\n#### 支持版本: SCP6.8.0及以上版本\n#### 注解: 1. 请求登录前接口请勿携带Cookie:aCMPTokenAuth=XX或X-Forwarded-For等请求头，否则可能会造成报401错误；2. 与以前的查询公钥接口共用同一套访问限制；3. 相同的IP每分钟只能请求60次，这是考虑到了NAT场景，多个用户/平台使用同一IP的情况；4. 查询公钥接口的全局阈值为每分钟1000次请求，这是所有请求的共同限制，也就是说达到了一分钟内达到了1000次，那该接口将自动封禁1分钟，期间请求均返回403错误\n"
        operationId: getPublicKeyV2
        responses:
          "200":
            content:
              application/json:
                example:
                  code: 0
                  data:
                    public_key: ""
                  message: ""
                schema:
                  allOf:
                    -
                                              $ref: "#/components/schemas/BaseResponseV1"
                    -
                                              properties:
                                                data:
                                                  properties:
                                                    public_key:
                                                      description: 公钥模数
                                                      type: string
                                                  type: object
                  type: object
            description: 成功响应
          "400":
            $ref: "#/components/responsesV1/400"
          "403":
            $ref: "#/components/responsesV1/403"
          "500":
            $ref: "#/components/responsesV1/500"
        summary: 获取公钥模数-v2
        tags:         - 系统管理
