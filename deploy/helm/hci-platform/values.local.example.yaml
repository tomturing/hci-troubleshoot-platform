# =============================================================================
# HCI 智能排障平台 - 本地 Helm 覆盖配置模板
# =============================================================================
# 使用方式：
#   cp deploy/helm/hci-platform/values.local.example.yaml .local/values-local.yaml
#   编辑填入真实值
#   该文件已在 .gitignore 中，不会提交到 git
# =============================================================================

global:
  # 平台根域名
  domain: "hci.local"
  imageRegistry: ""
  imagePullPolicy: IfNotPresent

ingress:
  annotations:
    # 本地 HTTP：web | 生产 HTTPS：websecure（需配置 TLS 证书）
    traefik.ingress.kubernetes.io/router.entrypoints: web

secrets:
  # !! 首次部署后 Postgres 密码不要修改（PVC 中已固化）
  postgresPassword: "CHANGE_ME_strong_password"

  # LLM API Key，从 https://open.bigmodel.cn/ 获取
  # 留空则 AI 对话返回 422 错误
  llmApiKey: "CHANGE_ME_your_llm_api_key"

  # Grafana admin 密码
  grafanaAdminPassword: "CHANGE_ME_grafana_password"

# 兼容已有 PVC（避免修改 volumeClaimTemplates 触发 Forbidden）
postgres:
  storage: 5Gi

redis:
  storage: 1Gi
