# values-prod.yaml — 生产环境 overlay
# 用法: helm install ... -f values.yaml -f values-prod.yaml --set secrets.postgresPassword=xxx

global:
  imagePullPolicy: Always

apiGateway:
  # WebSocket 粘性会话已在 values.yaml ingress.annotations 配置
  # 确认压测通过后可调至 2，当前保持单副本避免 WS 会话断裂
  replicaCount: 1
caseService:
  replicaCount: 2
conversationService:
  replicaCount: 2
schedulerService:
  replicaCount: 1

postgres:
  storage: 20Gi
  resources:
    limits:
      cpu: "2000m"
      memory: "1Gi"

redis:
  storage: 2Gi

config:
  logLevel: WARNING

hpa:
  # 生产环境启用 HPA 自动弹性伸缩（依赖 metrics-server，K3s 默认内置）
  enabled: true

# ingress.annotations 不再覆盖 entrypoints，保持 values.yaml 中的 web（HTTP）
# ⚠️  如需 HTTPS：先安装 cert-manager + ClusterIssuer，再在 override 文件中启用 websecure + TLS
