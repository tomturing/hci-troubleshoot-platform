# =============================================================================
# HCI 智能排障平台 - Helm Chart 默认配置
# =============================================================================

# ======================== 全局配置 ==========================================
global:
  namespace: hci-troubleshoot
  imageRegistry: "" # 私有镜像仓库前缀，如 "registry.example.com/"
  imagePullPolicy: IfNotPresent

# ======================== 生产稳态增强（多节点友好）==========================
workloadDefaults:
  securityContext:
    enabled: true
    # 为 Pod 启用默认 seccomp，提升基础隔离能力
    pod:
      seccompProfile:
        type: RuntimeDefault
    # 保守配置：不强制 runAsNonRoot，避免与现有镜像默认用户冲突
    container:
      allowPrivilegeEscalation: false
  scheduling:
    antiAffinity:
      # 软反亲和：单节点不阻塞调度，多节点优先分散副本
      enabled: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
  pdb:
    # 仅对副本数 > 1 的服务生成 PDB
    enabled: true
    minAvailable: 1

# ======================== PostgreSQL ========================================
postgres:
  enabled: true
  image: postgres:15
  storage: 5Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# ======================== Redis =============================================
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ======================== API Gateway =======================================
apiGateway:
  replicaCount: 1
  image:
    repository: hci-api-gateway
    tag: latest
  port: 8000
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Case Service ======================================
caseService:
  replicaCount: 1
  image:
    repository: hci-case-service
    tag: latest
  port: 8001
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Conversation Service ==============================
conversationService:
  replicaCount: 1
  image:
    repository: hci-conversation-service
    tag: latest
  port: 8002
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Scheduler Service =================================
schedulerService:
  replicaCount: 1
  image:
    repository: hci-scheduler-service
    tag: latest
  port: 8003
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Customer UI =======================================
customerUI:
  replicaCount: 1
  image:
    repository: hci-customer-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== Admin UI ==========================================
adminUI:
  replicaCount: 1
  image:
    repository: hci-admin-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== OpenClaw (容器化部署) ==============================
openclaw:
  enabled: true
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # 可选: 持久化 OpenClaw 工作目录
  # volumeMounts:
  #   - name: openclaw-data
  #     mountPath: /home/node/.openclaw
  # volumes:
  #   - name: openclaw-data
  #     hostPath:
  #       path: /home/bot/.openclaw
  #       type: DirectoryOrCreate

# ======================== Ingress (Traefik) =================================
ingress:
  enabled: true
  className: traefik
  annotations: {}
  # tls: []

# ======================== 应用配置（非敏感 → ConfigMap）=====================
config:
  postgresDb: hci_troubleshoot
  postgresUser: hci_admin
  redisUrl: "redis://redis:6379/0"
  logLevel: INFO
  otelEndpoint: "http://tempo.hci-observability.svc.cluster.local:4317"
  k8sNamespace: hci-troubleshoot
  warmPoolSize: "2"
  maxPoolSize: "10"
  podIdleTimeout: "300"
  openclawImage: "openclaw:latest"
  # v2.0 多助手注册表 (JSON)
  assistantRegistryJson: '{"openclaw":{"image":"hci-openclaw:latest","port":18789,"warm_pool_size":2,"max_pool_size":5,"idle_timeout":300,"display_name":"OpenClaw (GLM)","description":"基于智谱 GLM 模型的 AI 排障助手"}}'

# ======================== 敏感配置（→ Secret）===============================
# 生产环境通过 helm install --set secrets.postgresPassword=xxx 覆盖
secrets:
  postgresPassword: "dev_password_123"
  openclawToken: "hci-dev-openclaw-token"
  zaiApiKey: ""
  grafanaAdminPassword: "admin"

# ======================== 可观测性栈 ========================================
observability:
  enabled: true
  namespace: hci-observability
  loki:
    image: grafana/loki:latest
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  tempo:
    image: grafana/tempo:2.6.1
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  promtail:
    image: grafana/promtail:latest
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
  grafana:
    image: grafana/grafana:latest
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
