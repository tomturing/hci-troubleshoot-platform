# =============================================================================
# HCI 智能排障平台 - Helm Chart 默认配置
# =============================================================================

# ======================== 全局配置 ==========================================
global:
  namespace: hci-troubleshoot

  # ⚠️  路由模式 — 必须与 DNS 环境匹配，改错会导致所有服务 404
  # --------------------------------------------------------------------
  # "path"      路径路由（推荐，单 IP / 单域名场景）
  #             acli.sangfor.com.cn/         → customer-ui
  #             acli.sangfor.com.cn/admin/   → admin-ui
  #             acli.sangfor.com.cn/api      → api-gateway
  #             acli.sangfor.com.cn/grafana  → grafana
  #             ✅ 只需一条 A 记录指向服务器 IP
  #
  # "subdomain" 子域名路由（需要 DNS 通配符 *.your-domain.com）
  #             api.your-domain.com          → api-gateway
  #             admin.your-domain.com        → admin-ui
  #             your-domain.com              → customer-ui
  #             grafana.your-domain.com      → grafana
  #             ❌ 如果没有通配符 DNS 记录，此模式下子域名全部无法访问
  # --------------------------------------------------------------------
  routingMode: "path"

  # 平台根域名，routingMode=subdomain 时用于拼接子域名
  # routingMode=path 时此字段不影响路由，仅用于 Grafana Root URL 等辅助配置
  domain: "hci.local"

  # 公开访问完整 URL（协议+域名+端口），routingMode=path 时必填
  # 用途：Grafana GF_SERVER_ROOT_URL、前端 publicPath 等
  # 示例：http://acli.sangfor.com.cn:4888
  publicUrl: ""
  imageRegistry: "" # 私有镜像仓库前缀，如 "registry.example.com/"
  imagePullPolicy: IfNotPresent

# ======================== 生产稳态增强（多节点友好）==========================
workloadDefaults:
  securityContext:
    enabled: true
    # 为 Pod 启用默认 seccomp，提升基础隔离能力
    pod:
      seccompProfile:
        type: RuntimeDefault
    # 保守配置：不强制 runAsNonRoot，避免与现有镜像默认用户冲突
    container:
      allowPrivilegeEscalation: false
  scheduling:
    antiAffinity:
      # 软反亲和：单节点不阻塞调度，多节点优先分散副本
      enabled: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
  pdb:
    # 仅对副本数 > 1 的服务生成 PDB
    enabled: true
    minAvailable: 1

# ======================== PostgreSQL ========================================
postgres:
  enabled: true
  image: pgvector/pgvector:pg15 # 含 pgvector 扩展，支持向量检索（2026-03-09 从 postgres:15 升级）
  storage: 5Gi
  # ⚠️ StorageClass 说明：
  #   - 存量安装：保持 local-path（StatefulSet storageClass 为不可变字段，无法 upgrade 修改）
  #     现有 PV 已通过 kubectl patch pv 直接改为 Retain policy
  #   - 全新安装：可改为 local-path-retain（自动 Retain policy，更安全）
  storageClass: local-path
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # pg_dump 定时全量备份（每天 UTC 02:00，保留 30 天）
  backup:
    enabled: true
    schedule: "0 2 * * *"
    hostPath: "/srv/hci/backups/postgres"

# ======================== Redis =============================================
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ======================== API Gateway =======================================
apiGateway:
  replicaCount: 1
  image:
    repository: hci-api-gateway
    tag: latest
  port: 8000
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Case Service ======================================
caseService:
  replicaCount: 1
  image:
    repository: hci-case-service
    tag: latest
  port: 8001
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Conversation Service ==============================
conversationService:
  replicaCount: 1
  image:
    repository: hci-conversation-service
    tag: latest
  port: 8002
  # ⚠️  临时补丁：通过 ConfigMap 覆盖容器内 ai_client.py，解决旧镜像 60s 超时问题
  # TODO: 重建镜像后将 enabled 改为 false（新镜像通过 AI_CLIENT_READ_TIMEOUT_SEC 环境变量控制超时）
  aiClientPatch:
    enabled: true
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Scheduler Service =================================
schedulerService:
  replicaCount: 1
  image:
    repository: hci-scheduler-service
    tag: latest
  port: 8003
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== KB Service ========================================
kbService:
  enabled: true # 镜像 hci-kb-service 已构建并导入 k3s（2026-03-09）
  replicaCount: 1
  image:
    repository: hci-kb-service
    tag: latest
  port: 8004
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # Embedding 服务 URL（宿主机轻量 embedding 微服务，由 Docker hci-embedding 容器提供）
  zaiBaseUrl: "http://192.168.0.4:18100"
  zaiEmbeddingModel: "bge-small-zh-v1.5"
  embeddingDim: 512 # bge-small-zh-v1.5 实际输出 512 维，非 384
  # 大文件（>50KB Markdown）会生成 50+ chunks 批量 Embedding，5s 原始超时不够，改为 60s
  embeddingTimeoutSec: "60.0"
  bgeModelHostPath: /home/node/models/bge-small-zh-v1.5
  # SOP 技能目录挂载（从宿主机或 PVC 挂载）
  sopSkillsDir: /data/sop_skills
  # SOP 技能目录宿主机路径（hostPath 挂载源）
  sopSkillsHostPath: /aihci/hci-troubleshoot-platform/data-pipeline/sop_skills

# ======================== Customer UI =======================================
customerUI:
  replicaCount: 1
  image:
    repository: hci-customer-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== Admin UI ==========================================
adminUI:
  replicaCount: 1
  image:
    repository: hci-admin-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== OpenClaw (容器化部署) ==============================
openclaw:
  enabled: true
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # home 目录挂载策略：
  #   configMap.enabled=true  → 使用 ConfigMap 管理 openclaw.json（推荐生产环境）
  #   configMap.enabled=false → 保持 hostPath 挂载（兼容旧部署，保留 /home/node 所有文件）
  configMap:
    enabled: true
    # openclaw.json 内容（JSON 字符串），留空则由 values-prod.override.yaml 提供
    openclawJson: ""

# ======================== NetworkPolicy =====================================
networkPolicy:
  # 设为 true 后对 Postgres / Redis 启用最小权限入站规则
  enabled: false

# ======================== HPA（水平弹性伸缩）=================================
hpa:
  enabled: false
  targetCPUUtilizationPercentage: 70
  apiGateway:
    maxReplicas: 3
  caseService:
    maxReplicas: 6
  conversationService:
    maxReplicas: 6

# ======================== LearningClaw（常驻知识学习 Pod）==================
learningclaw:
  enabled: true
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  storageClassName: local-path-retain # 持久化 PVC，使用 retain 策略
  storageSize: 5Gi
  defaultMode: batch # 默认运行模式：batch / event / manual
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# ======================== ProductionClaw（Per-Case 排障 Pod）================
productionclaw:
  enabled: true
  # ProductionClaw 的 image 与 openclaw 相同，通过 init ConfigMap 差异化配置
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  # 每个 Pod 仅服务单个 Case，资源配额略低于 LearningClaw
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# ======================== Ingress (Traefik) =================================
ingress:
  enabled: true
  className: traefik
  annotations: {}
  # tls: []

# ======================== 应用配置（非敏感 → ConfigMap）=====================
config:
  postgresDb: hci_troubleshoot
  postgresUser: hci_admin
  redisUrl: "redis://redis:6379/0"
  logLevel: INFO
  otelEndpoint: "http://tempo.hci-observability.svc.cluster.local:4317"
  k8sNamespace: hci-troubleshoot
  warmPoolSize: "2"
  maxPoolSize: "10"
  podIdleTimeout: "300"
  # AI 客户端读超时（秒），注入到 conversation-service 容器；与补丁文件中的 os.environ.get 对应
  aiClientReadTimeoutSec: "120.0"
  # openclawImage 已废弃：OPENCLAW_IMAGE 现由 Helm 从 openclaw.image 自动派生，保留此字段仅供参考
  # openclawImage: "hci-openclaw:latest"
  # 服务地址（供 LearningClaw / ProductionClaw 调用内部 API）
  kbServiceUrl: "http://kb-service:8004"
  caseServiceUrl: "http://case-service:8001"
  conversationServiceUrl: "http://conversation-service:8002"
  learningclawServiceUrl: "http://learningclaw:18789"
  # ======================== 全局 AI 模型配置（所有 claw pod 共用）==========================
  # !! 修改此处即可切换平台所有 claw pod 使用的 AI 模型，无需逐个修改 ConfigMap !!
  # API key 在 secrets.zaiApiKey，运行时通过 ${ZAI_API_KEY} 注入
  glmProvider: "tly"
  glmModelId: "glm-5"
  glmBaseUrl: "https://open.bigmodel.cn/api/paas/v4"
  glmContextWindow: 128000

  # v3.0 多助手注册表：productionclaw = 一 Pod 一 Case 模式
  assistantRegistryJson: '{"productionclaw":{"image":"hci-openclaw:latest","port":18789,"warm_pool_size":2,"max_pool_size":10,"idle_timeout":0,"display_name":"ProductionClaw (GLM)","description":"一 Case 一 Pod AI 排障助手","init_configmap":"productionclaw-init-config","labels":{"claw-role":"production"}},"openclaw":{"image":"hci-openclaw:latest","port":18789,"warm_pool_size":1,"max_pool_size":5,"idle_timeout":300,"display_name":"OpenClaw (GLM)","description":"通用 AI 排障助手","labels":{"app.kubernetes.io/name":"openclaw"}}}'
  # 注意：assistantRegistryJson 中的 base_url 使用 K8s Service 内部地址
  # 格式：http://<service-name>:<port>

# ======================== 敏感配置（→ Secret）===============================
# 生产环境通过 helm install --set secrets.postgresPassword=xxx 覆盖
secrets:
  postgresPassword: "dev_password_123"
  openclawToken: "hci-dev-openclaw-token"
  zaiApiKey: ""
  grafanaAdminPassword: "admin"
  # 内部服务间 API 鉴权 Token（LearningClaw / ProductionClaw 调用 KB/Case/Conversation Service）
  internalApiToken: "hci-dev-internal-token"

# ======================== 可观测性栈 ========================================
observability:
  enabled: true
  namespace: hci-observability
  loki:
    image: grafana/loki:latest
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  tempo:
    image: grafana/tempo:2.6.1
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  promtail:
    image: grafana/promtail:latest
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
  grafana:
    image: grafana/grafana:latest
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  prometheus:
    enabled: true
    image: prom/prometheus:v2.52.0
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
