# =============================================================================
# HCI 智能排障平台 - Helm Chart 默认配置
# =============================================================================

# ======================== 全局配置 ==========================================
global:
  namespace: hci-troubleshoot

  # ⚠️  路由模式 — 必须与 DNS 环境匹配，改错会导致所有服务 404
  # --------------------------------------------------------------------
  # "path"      路径路由（推荐，单 IP / 单域名场景）
  #             acli.sangfor.com.cn/         → customer-ui
  #             acli.sangfor.com.cn/admin/   → admin-ui
  #             acli.sangfor.com.cn/api      → api-gateway
  #             acli.sangfor.com.cn/grafana  → grafana
  #             ✅ 只需一条 A 记录指向服务器 IP
  #
  # "subdomain" 子域名路由（需要 DNS 通配符 *.your-domain.com）
  #             api.your-domain.com          → api-gateway
  #             admin.your-domain.com        → admin-ui
  #             your-domain.com              → customer-ui
  #             grafana.your-domain.com      → grafana
  #             ❌ 如果没有通配符 DNS 记录，此模式下子域名全部无法访问
  # --------------------------------------------------------------------
  routingMode: "path"

  # 平台根域名，routingMode=subdomain 时用于拼接子域名
  # routingMode=path 时此字段不影响路由，仅用于 Grafana Root URL 等辅助配置
  domain: "hci.local"

  # 公开访问完整 URL（协议+域名+端口），routingMode=path 时必填
  # 用途：Grafana GF_SERVER_ROOT_URL、前端 publicPath 等
  # 示例：http://acli.sangfor.com.cn:4888
  publicUrl: ""
  imageRegistry: "" # 私有镜像仓库前缀，如 "registry.example.com/"
  imagePullPolicy: IfNotPresent
  # ghcr.io 镜像拉取 Secret 名称；非空时自动挂载到所有工作负载
  imagePullSecretName: ""
  # ghcr.io 认证用户名（与 secrets.ghcrToken 配合使用）
  imagePullUser: ""

# ======================== 集群级资源管理开关 ==================================
# 集群级资源（StorageClass / ClusterRole / ClusterRoleBinding）已迁移到
# 独立 Chart hci-platform-infra，由 ArgoCD Application hci-platform-infra 管理。
#
# manage: false（默认）→ 本 Chart 不渲染集群级资源，由 hci-platform-infra 负责
# manage: true         → 本 Chart 自行渲染（仅用于本地 helm install 调试）
clusterResources:
  manage: false

# ======================== 数据层资源管理开关 ==================================
# 数据层（PostgreSQL / Redis / 备份 CronJob）已迁移到
# 独立 Chart hci-platform-data，由各环境专属 ArgoCD Application 管理。
#
# manage: false（默认）→ 本 Chart 不渲染数据层资源，由 hci-platform-data 负责
# manage: true         → 本 Chart 自行渲染（仅用于本地 helm install 调试）
#
# ⚠️  DUAL-009 危险操作警告：
# 若当前 postgres/redis 已由 hci-platform 管理（manage=true 历史部署），
# 手动执行 helm upgrade 时若不显式传 --set dataLayer.manage=true，
# Helm 会将已有 StatefulSet 视为孤立资源并删除，导致数据库消失！
# 正确操作：始终使用 scripts/ops/k3s-deploy-dualrepo.sh（自动检测当前状态）
dataLayer:
  manage: false
  # 双重开关防护（C-1）：仅当明确知道要删除数据层时，才可同时设置mange=false + forceDelete=true
  # 默认必须为 false，防止误操作导致 StatefulSet 被 Helm 删除
  forceDelete: false

# ======================== 可观测性层资源管理开关 ================================
# 可观测性栈（Prometheus/Loki/Tempo/Grafana/Promtail）已迁移到
# 独立 Chart hci-platform-obs，由 ArgoCD Application hci-platform-obs 管理。
#
# manage: false（默认）→ 本 Chart 不渲染可观测性资源，由 hci-platform-obs 负责
# manage: true         → 本 Chart 自行渲染（仅用于本地 helm install 调试）
observabilityLayer:
  manage: false

workloadDefaults:
  securityContext:
    enabled: true
    # J-3 Pod 安全上下文基线（OWASP K8s Top 10：避免以 root 运行）
    # 所有业务 Pod 统一以 uid=1000/gid=1000 的非 root 用户运行
    # 若特定镜像无法以非 root 运行，在该服务的 values 中覆盖此配置
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    # J-3 容器安全上下文基线：删除所有 Linux capabilities，禁止提权
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      # readOnlyRootFilesystem 需要应用侧配合（tmpDir 挂载等），默认关闭
      # 待所有服务适配后启用（见 J-3 里程碑二）
      readOnlyRootFilesystem: false
  scheduling:
    antiAffinity:
      # 软反亲和：单节点不阻塞调度，多节点优先分散副本
      enabled: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
  pdb:
    # 仅对副本数 > 1 的服务生成 PDB
    enabled: true
    minAvailable: 1
  limitRange:
    # 为命名空间设置容器资源默认值和上限，防止无 limits 的容器打爆节点
    enabled: true
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    defaultLimit:
      cpu: "2"
      memory: "2Gi"
    max:
      cpu: "4"
      memory: "8Gi"

# ======================== PostgreSQL ========================================
postgres:
  enabled: true
  image: pgvector/pgvector:pg15 # 含 pgvector 扩展，支持向量检索
  storage: 5Gi
  # ⚠️ StorageClass 说明：
  #   - 存量安装：保持 local-path（StatefulSet storageClass 为不可变字段，无法 upgrade 修改）
  #     现有 PV 已通过 kubectl patch pv 直接改为 Retain policy
  #   - 全新安装：可改为 local-path-retain（自动 Retain policy，更安全）
  storageClass: local-path
  # NodePort 对外暴露端口（仅 dev 环境，生产环境留空）
  nodePort: ""
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # pg_dump 定时全量备份（每天 UTC 02:00，保留 30 天）
  backup:
    enabled: true
    schedule: "0 2 * * *"
    hostPath: "/srv/hci/backups/postgres"

# ======================== Redis =============================================
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ======================== API Gateway =======================================
apiGateway:
  replicaCount: 1
  checksumAnnotations: true
  image:
    repository: hci-api-gateway
    tag: latest
  port: 8000
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Case Service ======================================
caseService:
  replicaCount: 1
  image:
    repository: hci-case-service
    tag: latest
  port: 8001
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Conversation Service ==============================
conversationService:
  replicaCount: 1
  image:
    repository: hci-conversation-service
    tag: latest
  port: 8002
  # 设为 true 后 Pod 使用 dnsPolicy:None + 真实公网 DNS（114.114.114.114）
  externalDns: false
  # ReAct 引擎开关
  reactEnabled: "false"
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Scheduler Service =================================
schedulerService:
  replicaCount: 1
  image:
    repository: hci-scheduler-service
    tag: latest
  port: 8003
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== KB Service ========================================
kbService:
  enabled: true
  replicaCount: 1
  image:
    repository: hci-kb-service
    tag: latest
  port: 8004
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # Embedding 配置
  llmBaseUrl: "https://coding.dashscope.aliyuncs.com/v1"
  llmEmbeddingModel: "embedding-3"
  embeddingDim: 1536
  embeddingTimeoutSec: "60.0"
  bgeModelHostPath: /home/node/models/bge-small-zh-v1.5
  # SOP 技能目录挂载
  sopSkillsDir: /data/sop_skills
  sopSkillsHostPath: /aihci/hci-troubleshoot-platform/backend/kb-service/data/sop_skills

# ======================== Customer UI =======================================
customerUI:
  replicaCount: 1
  image:
    repository: hci-customer-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== Admin UI ==========================================
adminUI:
  replicaCount: 1
  image:
    repository: hci-admin-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== NetworkPolicy =====================================
networkPolicy:
  enabled: false

# ======================== HPA（水平弹性伸缩）=================================
hpa:
  enabled: false
  targetCPUUtilizationPercentage: 70
  apiGateway:
    maxReplicas: 3
  caseService:
    maxReplicas: 6
  conversationService:
    maxReplicas: 6

# ======================== Ingress (Traefik) =================================
ingress:
  enabled: true
  className: traefik
  annotations: {}
  grafanaRouterPriority: "2000"

# ======================== 应用配置（非敏感 → ConfigMap）=====================
config:
  postgresHost: postgres
  postgresDb: hci_troubleshoot
  postgresUser: hci_admin
  redisUrl: "redis://redis:6379/0"
  logLevel: INFO
  otelEndpoint: "http://tempo.hci-observability.svc.cluster.local:4317"
  k8sNamespace: hci-troubleshoot
  # 服务地址
  kbServiceUrl: "http://kb-service:8004"
  caseServiceUrl: "http://case-service:8001"
  conversationServiceUrl: "http://conversation-service:8002"
  # AI 客户端读超时（秒）
  aiClientReadTimeoutSec: "120.0"
  # ======================== LLM 配置（统一使用 dashscope 网关）================
  llmBaseUrl: "https://coding.dashscope.aliyuncs.com/v1"
  llmDefaultModel: "glm-5"
  aiCompletionsPath: "/chat/completions"
  # 助手注册表：3 个助手（htp-agent、ops-agent、pai-agent）
  # 留空时使用默认配置，环境仓库可覆盖
  assistantRegistryJson: ""
  # 助手选择器显示控制：auto（智能判断）、true（强制显示）、false（强制隐藏）
  assistantShowSelector: "auto"

# ======================== 敏感配置（→ Secret）===============================
# 生产环境通过 helm install --set secrets.xxx=xxx 覆盖
secrets:
  postgresPassword: "dev_password_123"
  # LLM API Key（用于 dashscope 网关调用 GLM-5）
  llmApiKey: ""
  # 内部服务间 API 鉴权 Token
  internalApiToken: "hci-dev-internal-token"
  grafanaAdminPassword: "admin"

# ======================== 可观测性栈 ========================================
observability:
  enabled: true
  namespace: hci-observability
  loki:
    image: grafana/loki:latest
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  tempo:
    image: grafana/tempo:2.6.1
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  promtail:
    image: grafana/promtail:latest
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
  grafana:
    image: grafana/grafana:latest
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  prometheus:
    enabled: true
    image: prom/prometheus:v2.52.0
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ======================== DB Migration（ArgoCD PreSync）===================
dbMigrate:
  enabled: true
  image:
    repository: "ghcr.io/tomturing/hci-troubleshoot-platform/db-migrate"
    tag: "latest"

# ======================== Smoke Test（ArgoCD PostSync）=====================
smokeTest:
  enabled: true
  timeoutSeconds: 120
  image: curlimages/curl:8.6.0

# ======================== ops-agent 服务配置 ==============================
opsAgent:
  enabled: false
  image:
    repository: "ghcr.io/p3n9w31/ops-agent"
    tag: "latest"
  service:
    type: ClusterIP
    port: 8006
  baseUrl: "http://ops-agent-service:8006"
  otelEndpoint: "http://hci-platform-otel-collector:4318"
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  opsWeb:
    enabled: false
    nodePort: 30791

# ======================== Agent Service =====================================
agentService:
  replicaCount: 1
  image:
    repository: agent-service
    tag: latest
  port: 8005
  externalDns: false
  glmModel: "glm-5"
  reactEnabled: "false"
  pydanticAiEnabled: "false"
  confirmTimeoutSec: "120"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# ======================== Eval Service ======================================
evalService:
  replicaCount: 1
  image:
    repository: eval-service
    tag: latest
  port: 8007
  prometheusUrl: "http://prometheus:9090"
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
