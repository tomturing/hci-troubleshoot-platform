# =============================================================================
# HCI 智能排障平台 - Helm Chart 默认配置
# =============================================================================

# ======================== 全局配置 ==========================================
global:
  namespace: hci-troubleshoot
  # 平台根域名，所有子域 (api/app/admin/grafana) 会基于此自动推导
  # 生产环境通过 --set global.domain=your-domain.com 覆盖
  domain: "hci.local"
  # 公开访问地址（协议+域名+端口），用于路径路由模式下 Grafana Root URL 等配置
  # 示例：http://acli.sangfor.com.cn:4888  或 https://example.com
  # 留空则 Grafana 使用默认 placeholder，仅影响管理员登录 redirect
  publicUrl: ""
  imageRegistry: "" # 私有镜像仓库前缀，如 "registry.example.com/"
  imagePullPolicy: IfNotPresent

# ======================== 生产稳态增强（多节点友好）==========================
workloadDefaults:
  securityContext:
    enabled: true
    # 为 Pod 启用默认 seccomp，提升基础隔离能力
    pod:
      seccompProfile:
        type: RuntimeDefault
    # 保守配置：不强制 runAsNonRoot，避免与现有镜像默认用户冲突
    container:
      allowPrivilegeEscalation: false
  scheduling:
    antiAffinity:
      # 软反亲和：单节点不阻塞调度，多节点优先分散副本
      enabled: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
  pdb:
    # 仅对副本数 > 1 的服务生成 PDB
    enabled: true
    minAvailable: 1

# ======================== PostgreSQL ========================================
postgres:
  enabled: true
  image: postgres:15
  storage: 5Gi
  # ⚠️ StorageClass 说明：
  #   - 存量安装：保持 local-path（StatefulSet storageClass 为不可变字段，无法 upgrade 修改）
  #     现有 PV 已通过 kubectl patch pv 直接改为 Retain policy
  #   - 全新安装：可改为 local-path-retain（自动 Retain policy，更安全）
  storageClass: local-path
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # pg_dump 定时全量备份（每天 UTC 02:00，保留 30 天）
  backup:
    enabled: true
    schedule: "0 2 * * *"
    hostPath: "/srv/hci/backups/postgres"

# ======================== Redis =============================================
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ======================== API Gateway =======================================
apiGateway:
  replicaCount: 1
  image:
    repository: hci-api-gateway
    tag: latest
  port: 8000
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Case Service ======================================
caseService:
  replicaCount: 1
  image:
    repository: hci-case-service
    tag: latest
  port: 8001
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Conversation Service ==============================
conversationService:
  replicaCount: 1
  image:
    repository: hci-conversation-service
    tag: latest
  port: 8002
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Scheduler Service =================================
schedulerService:
  replicaCount: 1
  image:
    repository: hci-scheduler-service
    tag: latest
  port: 8003
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Customer UI =======================================
customerUI:
  replicaCount: 1
  image:
    repository: hci-customer-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== Admin UI ==========================================
adminUI:
  replicaCount: 1
  image:
    repository: hci-admin-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== OpenClaw (容器化部署) ==============================
openclaw:
  enabled: true
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # home 目录挂载策略：
  #   configMap.enabled=true  → 使用 ConfigMap 管理 openclaw.json（推荐生产环境）
  #   configMap.enabled=false → 保持 hostPath 挂载（兼容旧部署，保留 /home/node 所有文件）
  configMap:
    enabled: true
    # openclaw.json 内容（JSON 字符串），留空则由 values-prod.override.yaml 提供
    openclawJson: ""

# ======================== NetworkPolicy =====================================
networkPolicy:
  # 设为 true 后对 Postgres / Redis 启用最小权限入站规则
  enabled: false

# ======================== HPA（水平弹性伸缩）=================================
hpa:
  enabled: false
  targetCPUUtilizationPercentage: 70
  apiGateway:
    maxReplicas: 3
  caseService:
    maxReplicas: 6
  conversationService:
    maxReplicas: 6

# ======================== Ingress (Traefik) =================================
ingress:
  enabled: true
  className: traefik
  annotations: {}
  # tls: []

# ======================== 应用配置（非敏感 → ConfigMap）=====================
config:
  postgresDb: hci_troubleshoot
  postgresUser: hci_admin
  redisUrl: "redis://redis:6379/0"
  logLevel: INFO
  otelEndpoint: "http://tempo.hci-observability.svc.cluster.local:4317"
  k8sNamespace: hci-troubleshoot
  warmPoolSize: "2"
  maxPoolSize: "10"
  podIdleTimeout: "300"
  # 镜像名必须与 docker build -t 的 tag 完全一致（hci- 前缀）
  openclawImage: "hci-openclaw:latest"
  # v2.0 多助手注册表 (JSON)：image 字段须与上面 openclawImage 保持一致
  assistantRegistryJson: '{"openclaw":{"image":"hci-openclaw:latest","port":18789,"warm_pool_size":2,"max_pool_size":5,"idle_timeout":300,"display_name":"OpenClaw (GLM)","description":"基于智谱 GLM 模型的 AI 排障助手"}}'
  # 注意：assistantRegistryJson 中的 base_url 使用 K8s Service 内部地址
  # 格式：http://<service-name>:<port>

# ======================== 敏感配置（→ Secret）===============================
# 生产环境通过 helm install --set secrets.postgresPassword=xxx 覆盖
secrets:
  postgresPassword: "dev_password_123"
  openclawToken: "hci-dev-openclaw-token"
  zaiApiKey: ""
  grafanaAdminPassword: "admin"

# ======================== 可观测性栈 ========================================
observability:
  enabled: true
  namespace: hci-observability
  loki:
    image: grafana/loki:latest
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  tempo:
    image: grafana/tempo:2.6.1
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  promtail:
    image: grafana/promtail:latest
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
  grafana:
    image: grafana/grafana:latest
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
