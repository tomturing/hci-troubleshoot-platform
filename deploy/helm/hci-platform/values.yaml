# =============================================================================
# HCI 智能排障平台 - Helm Chart 默认配置
# =============================================================================

# ======================== 全局配置 ==========================================
global:
  namespace: hci-troubleshoot

  # ⚠️  路由模式 — 必须与 DNS 环境匹配，改错会导致所有服务 404
  # --------------------------------------------------------------------
  # "path"      路径路由（推荐，单 IP / 单域名场景）
  #             acli.sangfor.com.cn/         → customer-ui
  #             acli.sangfor.com.cn/admin/   → admin-ui
  #             acli.sangfor.com.cn/api      → api-gateway
  #             acli.sangfor.com.cn/grafana  → grafana
  #             ✅ 只需一条 A 记录指向服务器 IP
  #
  # "subdomain" 子域名路由（需要 DNS 通配符 *.your-domain.com）
  #             api.your-domain.com          → api-gateway
  #             admin.your-domain.com        → admin-ui
  #             your-domain.com              → customer-ui
  #             grafana.your-domain.com      → grafana
  #             ❌ 如果没有通配符 DNS 记录，此模式下子域名全部无法访问
  # --------------------------------------------------------------------
  routingMode: "path"

  # 平台根域名，routingMode=subdomain 时用于拼接子域名
  # routingMode=path 时此字段不影响路由，仅用于 Grafana Root URL 等辅助配置
  domain: "hci.local"

  # 公开访问完整 URL（协议+域名+端口），routingMode=path 时必填
  # 用途：Grafana GF_SERVER_ROOT_URL、前端 publicPath 等
  # 示例：http://acli.sangfor.com.cn:4888
  publicUrl: ""
  imageRegistry: "" # 私有镜像仓库前缀，如 "registry.example.com/"
  imagePullPolicy: IfNotPresent
  # ghcr.io 镜像拉取 Secret 名称；非空时自动挂载到所有工作负载
  imagePullSecretName: ""
  # ghcr.io 认证用户名（与 secrets.ghcrToken 配合使用）
  imagePullUser: ""

# ======================== 集群级资源管理开关 ==================================
# 集群级资源（StorageClass / ClusterRole / ClusterRoleBinding）已迁移到
# 独立 Chart hci-platform-infra，由 ArgoCD Application hci-platform-infra 管理。
#
# manage: false（默认）→ 本 Chart 不渲染集群级资源，由 hci-platform-infra 负责
# manage: true         → 本 Chart 自行渲染（仅用于本地 helm install 调试）
clusterResources:
  manage: false

# ======================== 数据层资源管理开关 ==================================
# 数据层（PostgreSQL / Redis / 备份 CronJob）已迁移到
# 独立 Chart hci-platform-data，由各环境专属 ArgoCD Application 管理。
#
# manage: false（默认）→ 本 Chart 不渲染数据层资源，由 hci-platform-data 负责
# manage: true         → 本 Chart 自行渲染（仅用于本地 helm install 调试）
#
# ⚠️  DUAL-009 危险操作警告：
# 若当前 postgres/redis 已由 hci-platform 管理（manage=true 历史部署），
# 手动执行 helm upgrade 时若不显式传 --set dataLayer.manage=true，
# Helm 会将已有 StatefulSet 视为孤立资源并删除，导致数据库消失！
# 正确操作：始终使用 scripts/ops/k3s-deploy-dualrepo.sh（自动检测当前状态）
dataLayer:
  manage: false
  # 双重开关防护（C-1）：仅当明确知道要删除数据层时，才可同时设置mange=false + forceDelete=true
  # 默认必须为 false，防止误操作导致 StatefulSet 被 Helm 删除
  forceDelete: false

# ======================== 可观测性层资源管理开关 ================================
# 可观测性栈（Prometheus/Loki/Tempo/Grafana/Promtail）已迁移到
# 独立 Chart hci-platform-obs，由 ArgoCD Application hci-platform-obs 管理。
#
# manage: false（默认）→ 本 Chart 不渲染可观测性资源，由 hci-platform-obs 负责
# manage: true         → 本 Chart 自行渲染（仅用于本地 helm install 调试）
observabilityLayer:
  manage: false

workloadDefaults:
  securityContext:
    enabled: true
    # J-3 Pod 安全上下文基线（OWASP K8s Top 10：避免以 root 运行）
    # 所有业务 Pod 统一以 uid=1000/gid=1000 的非 root 用户运行
    # 若特定镜像无法以非 root 运行，在该服务的 values 中覆盖此配置
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    # J-3 容器安全上下文基线：删除所有 Linux capabilities，禁止提权
    container:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      # readOnlyRootFilesystem 需要应用侧配合（tmpDir 挂载等），默认关闭
      # 待所有服务适配后启用（见 J-3 里程碑二）
      readOnlyRootFilesystem: false
  scheduling:
    antiAffinity:
      # 软反亲和：单节点不阻塞调度，多节点优先分散副本
      enabled: true
      topologyKey: kubernetes.io/hostname
      weight: 100
    topologySpread:
      enabled: true
      topologyKey: kubernetes.io/hostname
      maxSkew: 1
      whenUnsatisfiable: ScheduleAnyway
  pdb:
    # 仅对副本数 > 1 的服务生成 PDB
    enabled: true
    minAvailable: 1
  limitRange:
    # 为命名空间设置容器资源默认值和上限，防止无 limits 的容器（如 productionclaw）打爆节点
    enabled: true
    defaultRequest:
      cpu: "50m"
      memory: "64Mi"
    defaultLimit:
      cpu: "2"
      memory: "2Gi"
    max:
      cpu: "4"
      memory: "4Gi"

# ======================== PostgreSQL ========================================
postgres:
  enabled: true
  image: pgvector/pgvector:pg15 # 含 pgvector 扩展，支持向量检索（2026-03-09 从 postgres:15 升级）
  storage: 5Gi
  # ⚠️ StorageClass 说明：
  #   - 存量安装：保持 local-path（StatefulSet storageClass 为不可变字段，无法 upgrade 修改）
  #     现有 PV 已通过 kubectl patch pv 直接改为 Retain policy
  #   - 全新安装：可改为 local-path-retain（自动 Retain policy，更安全）
  storageClass: local-path
  # NodePort 对外暴露端口（仅 dev 环境，生产环境留空）
  nodePort: ""
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # pg_dump 定时全量备份（每天 UTC 02:00，保留 30 天）
  backup:
    enabled: true
    schedule: "0 2 * * *"
    hostPath: "/srv/hci/backups/postgres"

# ======================== Redis =============================================
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ======================== API Gateway =======================================
apiGateway:
  replicaCount: 1
  # 启用 configmap/secret sha256 注解（用于 pod 滚动更新自动感知配置变化）
  # 仅测试时可设 false，以避免 helm-unittest 加载跨文件 include 依赖
  checksumAnnotations: true
  image:
    repository: hci-api-gateway
    tag: latest
  port: 8000
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Case Service ======================================
caseService:
  replicaCount: 1
  image:
    repository: hci-case-service
    tag: latest
  port: 8001
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Conversation Service ==============================
conversationService:
  replicaCount: 1
  image:
    repository: hci-conversation-service
    tag: latest
  port: 8002
  # 设为 true 后 Pod 使用 dnsPolicy:None + 真实公网 DNS（114.114.114.114），
  # 用于 openclawBaseUrl 指向外部 API（如 open.bigmodel.cn）需绕过 Clash fake-IP 场景
  externalDns: false
  # Phase 3: ReAct 引擎开关（默认关闭，环境仓库覆盖启用）
  reactEnabled: "false"
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== Scheduler Service =================================
schedulerService:
  replicaCount: 1
  image:
    repository: hci-scheduler-service
    tag: latest
  port: 8003
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

# ======================== KB Service ========================================
kbService:
  enabled: true # 镜像 hci-kb-service 已构建并导入 k3s（2026-03-09）
  replicaCount: 1
  image:
    repository: hci-kb-service
    tag: latest
  port: 8004
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # Embedding 服务 URL（宿主机轻量 embedding 微服务，由 Docker hci-embedding 容器提供）
  zaiBaseUrl: "http://192.168.0.4:18100"
  zaiEmbeddingModel: "bge-small-zh-v1.5"
  embeddingDim: 512 # bge-small-zh-v1.5 实际输出 512 维，非 384
  # 大文件（>50KB Markdown）会生成 50+ chunks 批量 Embedding，5s 原始超时不够，改为 60s
  embeddingTimeoutSec: "60.0"
  bgeModelHostPath: /home/node/models/bge-small-zh-v1.5
  # SOP 技能目录挂载（从宿主机或 PVC 挂载）
  sopSkillsDir: /data/sop_skills
  # SOP 技能目录宿主机路径（hostPath 挂载源）
  sopSkillsHostPath: /aihci/hci-troubleshoot-platform/backend/kb-service/data/sop_skills

# ======================== Customer UI =======================================
customerUI:
  replicaCount: 1
  image:
    repository: hci-customer-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== Admin UI ==========================================
adminUI:
  replicaCount: 1
  image:
    repository: hci-admin-ui
    tag: latest
  port: 80
  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ======================== OpenClaw (容器化部署) ==============================
openclaw:
  enabled: true
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  resources:
    requests:
      cpu: "100m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"
  # home 目录挂载策略：
  #   configMap.enabled=true  → 使用 ConfigMap 管理 openclaw.json（推荐生产环境）
  #   configMap.enabled=false → 保持 hostPath 挂载（兼容旧部署，保留 /home/node 所有文件）
  configMap:
    enabled: true
    # openclaw.json 内容（JSON 字符串）。
    # 默认提供可在非 loopback 场景启动的 controlUi 配置，避免 gateway 启动时因 origin 校验失败退出。
    # 包含  agents.defaults（GLM 模型）+ models.providers（zhipu）配置
    # 与 learningclaw-init-configmap 中的模型配置保持一致，避免使用默认 anthropic 模型
    openclawJson: '{"agents":{"defaults":{"model":{"primary":"zhipu/glm-5"},"models":{"zhipu/glm-5":{"alias":"GLM"}},"workspace":"/home/node/.openclaw/workspace","compaction":{"mode":"safeguard"}}},"models":{"mode":"merge","providers":{"zhipu":{"api":"openai-completions","apiKey":"${OPENCLAW_API_KEY}","baseUrl":"https://open.bigmodel.cn/api/paas/v4","models":[{"contextWindow":128000,"id":"glm-5","name":"GLM"}]}}},"gateway":{"mode":"local","bind":"lan","controlUi":{"enabled":true,"dangerouslyAllowHostHeaderOriginFallback":true,"dangerouslyDisableDeviceAuth":true},"auth":{"mode":"token","token":"${OPENCLAW_GATEWAY_TOKEN}"},"http":{"endpoints":{"chatCompletions":{"enabled":true}}}}}'

# ======================== NetworkPolicy =====================================
networkPolicy:
  # 设为 true 后对 Postgres / Redis 启用最小权限入站规则
  enabled: false

# ======================== HPA（水平弹性伸缩）=================================
hpa:
  enabled: false
  targetCPUUtilizationPercentage: 70
  apiGateway:
    maxReplicas: 3
  caseService:
    maxReplicas: 6
  conversationService:
    maxReplicas: 6

# ======================== LearningClaw（常驻知识学习 Pod）==================
learningclaw:
  enabled: true
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  storageClassName: local-path-retain # 持久化 PVC，使用 retain 策略
  storageSize: 5Gi
  defaultMode: batch # 默认运行模式：batch / event / manual
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"
    limits:
      cpu: "1000m"
      memory: "2Gi"

# ======================== ProductionClaw（Per-Case 排障 Pod）================
productionclaw:
  enabled: true
  # ProductionClaw 的 image 与 openclaw 相同，通过 init ConfigMap 差异化配置
  image:
    repository: hci-openclaw
    tag: latest
  port: 18789
  # 每个 Pod 仅服务单个 Case，资源配额略低于 LearningClaw
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

# ======================== Ingress (Traefik) =================================
ingress:
  enabled: true
  className: traefik
  annotations: {}
  # Grafana 独立 ingress 的 Traefik 路由优先级。
  # 必须高于主站 hci-ingress 的 / 回退路由，避免 /grafana 被 customer-ui 吞掉。
  grafanaRouterPriority: "2000"
  # TLS 入口点名称（启用 TLS 时使用）
  # staging 默认使用 websecure（端口 4443）
  # prod 可设置为 prod-websecure（端口 3443）
  # entrypoint: websecure
  # tls: []

# ======================== 应用配置（非敏感 → ConfigMap）=====================
config:
  postgresHost: postgres # 跨 namespace 部署时可覆盖为完整 DNS，如 postgres.hci-troubleshoot.svc.cluster.local
  postgresDb: hci_troubleshoot
  postgresUser: hci_admin
  redisUrl: "redis://redis:6379/0"
  logLevel: INFO
  otelEndpoint: "http://tempo.hci-observability.svc.cluster.local:4317"
  k8sNamespace: hci-troubleshoot
  warmPoolSize: "2"
  maxPoolSize: "10"
  podIdleTimeout: "300"
  # AI 客户端读超时（秒），注入到 conversation-service 容器；与补丁文件中的 os.environ.get 对应
  aiClientReadTimeoutSec: "120.0"
  # openclawImage 已废弃：OPENCLAW_IMAGE 现由 Helm 从 openclaw.image 自动派生，保留此字段仅供参考
  # openclawImage: "hci-openclaw:latest"
  # 服务地址（供 LearningClaw / ProductionClaw 调用内部 API）
  kbServiceUrl: "http://kb-service:8004"
  caseServiceUrl: "http://case-service:8001"
  conversationServiceUrl: "http://conversation-service:8002"
  learningclawServiceUrl: "http://learningclaw:18789"
  # ======================== 全局 AI 模型配置（所有 claw pod 共用）==========================
  # !! 修改此处即可切换平台所有 claw pod 使用的 AI 模型，无需逐个修改 ConfigMap !!
  # API key 在 secrets.zaiApiKey，Secret key 为 OPENCLAW_API_KEY
  glmProvider: "zhipu"
  glmModelId: "glm-4-flash"
  glmBaseUrl: "https://open.bigmodel.cn/api/paas/v4"
  glmContextWindow: 128000

  # v3.0 多助手注册表：留空时由模板按 openclaw.image 自动生成
  # 如需完全自定义，可在环境覆盖文件中提供完整 JSON 字符串
  assistantRegistryJson: ""
  # 注意：assistantRegistryJson 中的 base_url 使用 K8s Service 内部地址
  # 格式：http://<service-name>:<port>
  #
  # ======================== assistantRegistryJson 字段说明（v2.1）==================
  # | 字段           | 类型     | 必填 | 说明                                   |
  # |----------------|----------|------|----------------------------------------|
  # | type           | string   | 是   | 助手类型标识，全局唯一                  |
  # | display_name   | string   | 是   | 前端显示名称                            |
  # | description    | string   | 否   | 助手功能描述                            |
  # | capabilities   | string[] | 否   | 能力标签数组，前端显示                  |
  # | is_default     | boolean  | 否   | 是否为默认助手                          |
  # | enabled        | boolean  | 否   | 是否启用，默认 true                     |
  # | warm_pool_size | int      | 否   | 热备池大小，Pod 模式必填                |
  # | max_pool_size  | int      | 否   | 最大池大小，Pod 模式必填                |
  # | base_url       | string   | 否   | API 地址，直连模式必填                  |
  # | provider_api_key| string  | 否   | 外部模型 API Key，直连模式必填          |
  # | gateway_token  | string   | 否   | OpenClaw 网关 Token，Pod 模式必填       |
  #
  # 接入模式说明：
  # - Pod 模式（warm_pool_size > 0）：Scheduler 在 K8s 启动 AI Pod
  # - 直连模式（warm_pool_size=0 & max_pool_size=0）：直接调用外部 LLM API

  # ======================== 助手选择器显示控制（v2.1）===========================
  # 可选值：auto（智能判断）、true（强制显示）、false（强制隐藏）
  # auto 模式：当可用助手数量 > 1 时自动显示选择器
  # 生产环境建议使用 auto 或 false（单助手场景自动隐藏）
  assistantShowSelector: "auto"

# ======================== Phase 3: ReAct 引擎外部依赖配置 ===================
# SCP 平台 API base URL，格式：http://host:port（通过环境变量注入 conversation-service）
scpBaseUrl: ""
# HCI SSH 连接配置（acli 命令执行）
hciSsh:
  user: "admin"
  keyPath: "" # SSH 私钥路径，与 hci-ssh-password 二选一

# ======================== 敏感配置（→ Secret）===============================
# 生产环境通过 helm install --set secrets.postgresPassword=xxx 覆盖
secrets:
  postgresPassword: "dev_password_123"
  openclawToken: "hci-dev-openclaw-token"
  zaiApiKey: ""
  grafanaAdminPassword: "admin"
  # 内部服务间 API 鉴权 Token（LearningClaw / ProductionClaw 调用 KB/Case/Conversation Service）
  internalApiToken: "hci-dev-internal-token"
  # Phase 3: SCP 平台 API Key（x-auth-token 头部认证）
  scpApiKey: ""
  # Phase 3: HCI SSH 连接密码（与 hciSsh.keyPath 二选一）
  hciSshPassword: ""

# ======================== 可观测性栈 ========================================
observability:
  enabled: true
  namespace: hci-observability
  loki:
    image: grafana/loki:latest
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  tempo:
    image: grafana/tempo:2.6.1
    storage: 2Gi
    storageClass: local-path
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
  promtail:
    image: grafana/promtail:latest
    resources:
      requests:
        cpu: "25m"
        memory: "32Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"
  grafana:
    image: grafana/grafana:latest
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"
  prometheus:
    enabled: true
    image: prom/prometheus:v2.52.0
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ======================== DB Migration（ArgoCD PreSync）===================
# 每次 ArgoCD Sync 前自动执行 atlas schema apply（声明式）
# 单一真实来源：database/desired_schema.sql，Atlas 自动计算并执行 diff，无需增量迁移文件
#
# image：db-migrate 自定义镜像，由 CI 在 main push 时构建（Dockerfile.migrations）
#   格式（repository + tag 分离，与其他服务保持一致，env-repo-sync 可自动替换 tag 字段）：
#     repository: ghcr.io/<owner>/hci-troubleshoot-platform/db-migrate
#     tag: YYYYMMDD-HHMM-<sha7>
#   镜像内含 database/desired_schema.sql，atlas schema apply 以声明式模式同步数据库
dbMigrate:
  enabled: true
  image:
    repository: "ghcr.io/tomturing/hci-troubleshoot-platform/db-migrate"
    tag: "latest"

# ======================== Smoke Test（ArgoCD PostSync）=====================
# Layer-1 防御：每次 ArgoCD 同步后自动验证所有后端 /health 端点
# 超时未就绪则 Sync 状态变为 Degraded，阻止静默失败上线
smokeTest:
  enabled: true
  # 冒烟测试总超时秒数（12次重试×10s=120s，与 Job activeDeadlineSeconds 一致）
  timeoutSeconds: 120
  # 使用静态 tag 避免 imagePullPolicy:Always 在无网络环境下拉取失败
  image: curlimages/curl:8.6.0
