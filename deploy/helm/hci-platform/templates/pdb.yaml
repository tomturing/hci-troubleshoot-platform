{{- if .Values.workloadDefaults.pdb.enabled }}
{{- if gt (int .Values.apiGateway.replicaCount) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "api-gateway" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  minAvailable: {{ .Values.workloadDefaults.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "api-gateway" "Release" .Release) | nindent 6 }}
---
{{- end }}
