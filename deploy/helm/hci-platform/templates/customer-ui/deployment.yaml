apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-ui
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "customer-ui" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.customerUI.replicaCount }}
  revisionHistoryLimit: 3  # 只保留最近 3 个 ReplicaSet，避免空 RS 僵尸积累
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "customer-ui" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "customer-ui" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "customer-ui") | nindent 6 }}
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
      containers:
        - name: customer-ui
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.customerUI.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.customerUI.port }}
              protocol: TCP
          volumeMounts:
            # J-3: nginx 以 uid=1000 运行时无权写 /var/cache/nginx 和 /var/run
            # 挂载 emptyDir 覆盖这两个目录，nginx 可正常创建 temp 文件和 pid 文件
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.customerUI.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.customerUI.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.customerUI.resources | nindent 12 }}
        - name: nginx-run
          emptyDir: {}
