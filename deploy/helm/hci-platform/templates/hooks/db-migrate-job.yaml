{{- if .Values.dbMigrate.enabled }}
# DB Schema 同步 Job — ArgoCD PreSync Hook
# 每次 ArgoCD Sync 前执行，入口脚本 db-migrate.sh 按顺序完成三步迁移
#
# 工作模式：声明式（Atlas schema apply）+ 幂等（psql 函数/触发器）
#   1. psql → desired_extras.sql（函数，幂等：CREATE OR REPLACE FUNCTION）
#   2. atlas schema apply → desired_schema.sql（表/ENUM/索引，声明式差量）
#   3. psql → desired_extras.sql（触发器，幂等：DROP TRIGGER IF EXISTS + CREATE TRIGGER）
#
# 开发者工作流：
#   修改表结构 → 编辑 database/desired_schema.sql
#   修改函数/触发器 → 编辑 database/desired_extras.sql
#   提交 PR → CI 验证 → 合并 → 自动构建镜像 → ArgoCD sync → 本 Job 执行
apiVersion: batch/v1
kind: Job
metadata:
  {{- $tag := .Values.dbMigrate.image.tag | default "latest" | regexReplaceAll "[^a-z0-9A-Z-]" "" | lower | trunc 15 | trimSuffix "-" }}
  {{- $chartVer := .Chart.Version | regexReplaceAll "[^a-z0-9]" "" | lower }}
  name: db-migrate-{{ $tag }}-{{ $chartVer }}
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migrate
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    helm.sh/hook-weight: "-5"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/component: db-migrate
        {{- include "hci.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      {{- if .Values.global.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534   # nobody（postgres:15-alpine 默认用户）
        fsGroup: 65534
      # initContainer：为 Atlas dev-url 建立 atlas_dev 空数据库（幂等）
      # Atlas 需要一个与目标版本一致的空 PostgreSQL 库来规范化 DDL
      initContainers:
        - name: init-atlas-dev
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              set -e
              # 1. 确保目标库有所有必要 extensions（声明式 schema 使用 vector/pgcrypto 类型）
              psql "$DATABASE_URL" -c "
                CREATE EXTENSION IF NOT EXISTS vector;
                CREATE EXTENSION IF NOT EXISTS pgcrypto;
                CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
                CREATE EXTENSION IF NOT EXISTS pg_trgm;
              "
              # 2. 确保 Atlas dev 空数据库存在（Atlas 用于规范化 DDL，需与目标库同版本）
              psql "$DATABASE_URL" -tc \
                "SELECT 1 FROM pg_database WHERE datname='atlas_dev';" \
                | grep -q 1 || \
                psql "$DATABASE_URL" -c "CREATE DATABASE atlas_dev;"
              psql "$ATLAS_DEV_URL" -c "
                CREATE EXTENSION IF NOT EXISTS vector;
                CREATE EXTENSION IF NOT EXISTS pgcrypto;
                CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
                CREATE EXTENSION IF NOT EXISTS pg_trgm;
              "
              echo "初始化完成"
          env:
            - name: DATABASE_URL
              value: {{ printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresHost .Values.config.postgresDb | quote }}
            - name: ATLAS_DEV_URL
              value: {{ printf "postgres://%s:%s@%s:5432/atlas_dev?sslmode=disable" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresHost | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: db-migrate
          image: {{ .Values.dbMigrate.image.repository }}:{{ .Values.dbMigrate.image.tag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
          # 使用镜像 ENTRYPOINT（/db-migrate.sh），无需覆盖 command
          env:
            - name: DATABASE_URL
              value: {{ printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresHost .Values.config.postgresDb | quote }}
            - name: DEV_URL
              value: {{ printf "postgres://%s:%s@%s:5432/atlas_dev?sslmode=disable" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresHost | quote }}
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- end }}
