{{- /*
B-1: Helm post-upgrade hook — 触发 Prometheus 配置热重载
在 helm upgrade 成功后发送 /-/reload 请求给 Prometheus Service，
避免 ConfigMap 更新后需要手动 rollout restart。
Prometheus 需启动 --web.enable-lifecycle（已在 prometheus.yaml 配置）。
*/ -}}
{{- if .Values.observability.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: post-upgrade-prometheus-reload-{{ .Release.Revision }}
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
    app.kubernetes.io/component: helm-hook
  annotations:
    "helm.sh/hook": post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": hook-succeeded,hook-failed
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/component: helm-hook
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prometheus-reload
          image: curlimages/curl:8.6.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              PROM_URL="http://prometheus.{{ .Values.observability.namespace }}.svc.cluster.local:9090/-/reload"
              echo "[hook] 通过 Service 触发 Prometheus 配置热重载: ${PROM_URL}"
              if curl -fsS \
                --retry 24 \
                --retry-all-errors \
                --retry-delay 5 \
                -X POST \
                "${PROM_URL}"; then
                echo "[hook] Prometheus 热重载成功 ✓"
              else
                echo "[hook] Prometheus 热重载失败（非致命，继续）"
              fi
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
{{- end }}
