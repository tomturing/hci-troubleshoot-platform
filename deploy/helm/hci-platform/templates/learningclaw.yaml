{{- if .Values.learningclaw.enabled }}
# LearningClaw — 常驻知识学习 Pod (StatefulSet + PVC + Service)
# 职责：从网页案例库和已结案工单中提炼知识，写入 KB Service (pgvector)
# 生命周期：平台启动即运行，永不停止
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: learningclaw
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "learningclaw" "Release" .Release "Chart" .Chart) | nindent 4 }}
    claw-role: learner
spec:
  replicas: 1
  serviceName: learningclaw
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "learningclaw" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "learningclaw" "Release" .Release "Chart" .Chart) | nindent 8 }}
        claw-role: learner
    spec:
      {{- if .Values.global.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      {{- end }}
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      initContainers:
        # init 容器：将 ConfigMap 中的初始化文件复制到 openclaw workspace
        - name: init-workspace
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.learningclaw.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 1001
            runAsGroup: 1001
          env:
            - name: OPENCLAW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: OPENCLAW_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "初始化 LearningClaw workspace..."
              # 确保目录存在
              mkdir -p /home/node/.openclaw/workspace/memory
              mkdir -p /home/node/.openclaw/agents/main/sessions

              # 复制初始化文件（仅在文件不存在时，保留已运行时的修改）
              for f in SOUL.md IDENTITY.md AGENTS.md BOOTSTRAP.md TOOLS.md USER.md; do
                if [ ! -f "/home/node/.openclaw/workspace/${f}" ]; then
                  cp "/init-config/${f}" "/home/node/.openclaw/workspace/${f}"
                  echo "  已复制 ${f}"
                else
                  echo "  跳过 ${f}（已存在，保留现有版本）"
                fi
              done

              # openclaw.json 始终覆盖（配置变更需要生效），同时替换运行时变量
              sed "s/\${OPENCLAW_GATEWAY_TOKEN}/${OPENCLAW_GATEWAY_TOKEN}/g; s/\${OPENCLAW_API_KEY}/${OPENCLAW_API_KEY}/g" \
                /init-config/openclaw.json > /home/node/.openclaw/openclaw.json
              # 快速失败：验证 agents.defaults.model.primary 必须配置，防止静默 fallback 到 anthropic
              PRIMARY=$(node -e "const c=JSON.parse(require('fs').readFileSync('/home/node/.openclaw/openclaw.json','utf8')); console.log(c?.agents?.defaults?.model?.primary||'')" 2>/dev/null)
              if [ -z "$PRIMARY" ]; then
                echo "❌ FATAL: agents.defaults.model.primary 未配置！openclaw 将 fallback 到 anthropic/claude-opus-4-6"
                exit 1
              fi
              echo "  已更新 openclaw.json，model=${PRIMARY}"

              # 初始化学习进度文件（仅首次）
              if [ ! -f "/home/node/.openclaw/workspace/memory/learning_progress.md" ]; then
                cat > /home/node/.openclaw/workspace/memory/learning_progress.md << 'EOF'
              # LearningClaw 学习进度

              ## 状态
              首次启动，尚未开始学习。

              ## 最后处理
              - last_processed_case_url: ""
              - last_processed_at: ""
              - total_ingested: 0
              EOF
                echo "  已初始化 learning_progress.md"
              fi

              echo "✅ LearningClaw workspace 初始化完成"
          volumeMounts:
            - name: learningclaw-home
              mountPath: /home/node
            - name: init-config
              mountPath: /init-config
              readOnly: true
      containers:
        - name: learningclaw
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.learningclaw.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.learningclaw.port }}
              protocol: TCP
              name: gateway
          env:
            - name: HOME
              value: "/home/node"
            - name: TERM
              value: "xterm-256color"
            - name: OPENCLAW_SKIP_CANVAS_HOST
              value: "1"
            # AI 模型密钥（从 hci-secrets[OPENCLAW_API_KEY] 注入，对应 secrets.zaiApiKey）
            - name: OPENCLAW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: OPENCLAW_API_KEY
            # openclaw 网关 Token
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
            # 内部 API 鉴权 Token（调用其他服务）
            - name: INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: INTERNAL_API_TOKEN
            # 服务地址（通过 ConfigMap 注入）
            - name: KB_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: hci-common-config
                  key: KB_SERVICE_URL
            - name: CASE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: hci-common-config
                  key: CASE_SERVICE_URL
            - name: CONVERSATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: hci-common-config
                  key: CONVERSATION_SERVICE_URL
            # Pod 身份（Downward API）
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # 运行模式（可被 CronJob 覆盖）
            - name: LEARNINGCLAW_MODE
              value: "{{ .Values.learningclaw.defaultMode | default "batch" }}"
          command: ["node", "dist/index.js", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "{{ .Values.learningclaw.port }}"]
          volumeMounts:
            - name: learningclaw-home
              mountPath: /home/node
          livenessProbe:
            tcpSocket:
              port: {{ .Values.learningclaw.port }}
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.learningclaw.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.learningclaw.resources | nindent 12 }}
      {{ include "hci.clawDnsConfig" . | nindent 6 }}
      volumes:
        - name: init-config
          configMap:
            name: learningclaw-init-config
  # PVC 模板：持久化 /home/node（openclaw 配置、session、memory 全部在此）
  volumeClaimTemplates:
    - metadata:
        name: learningclaw-home
        labels:
          {{- include "hci.labels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.learningclaw.storageClassName | default "local-path-retain" }}
        resources:
          requests:
            storage: {{ .Values.learningclaw.storageSize | default "5Gi" }}
---
# ClusterIP Service：供调度器和 CronJob 调用
apiVersion: v1
kind: Service
metadata:
  name: learningclaw
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "learningclaw" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.learningclaw.port }}
      targetPort: {{ .Values.learningclaw.port }}
      protocol: TCP
      name: gateway
      nodePort: {{ .Values.learningclaw.nodePort | default 30790 }}
  selector:
    {{- include "hci.selectorLabels" (dict "name" "learningclaw" "Release" .Release) | nindent 4 }}
---
# CronJob：每日凌晨 02:00 触发 LearningClaw 批量学习
apiVersion: batch/v1
kind: CronJob
metadata:
  name: learningclaw-daily-batch
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: trigger
              image: curlimages/curl:8.5.0
              env:
                - name: OPENCLAW_GATEWAY_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hci-secrets
                      key: OPENCLAW_GATEWAY_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  # 向 LearningClaw 发送学习任务（通过 chat completions API）
                  curl -sf -X POST \
                    http://learningclaw:{{ .Values.learningclaw.port }}/v1/chat/completions \
                    -H "Authorization: Bearer ${OPENCLAW_GATEWAY_TOKEN}" \
                    -H "Content-Type: application/json" \
                    -d '{
                      "model": "default",
                      "messages": [
                        {
                          "role": "user",
                          "content": "开始今日批量学习任务。请读取 BOOTSTRAP.md，以 batch 模式运行，从 Sangfor 案例库获取新案例并摄入知识库。完成后输出学习报告。"
                        }
                      ]
                    }' \
                    --max-time 3600 \
                  && echo "✅ 批量学习任务已完成" \
                  || echo "❌ 批量学习任务失败，请检查 LearningClaw 日志"
{{- end }}
