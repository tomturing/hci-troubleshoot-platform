apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "scheduler-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.schedulerService.replicaCount }}
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "scheduler-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "scheduler-service" "Release" .Release "Chart" .Chart) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.schedulerService.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: scheduler-service
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "scheduler-service") | nindent 6 }}
      containers:
        - name: scheduler-service
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.schedulerService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.schedulerService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hci-common-config
            - secretRef:
                name: hci-secrets
          env:
            - name: SERVICE_NAME
              value: "scheduler-service"
            - name: SERVICE_PORT
              value: {{ .Values.schedulerService.port | quote }}
            - name: DATABASE_URL
              # 使用 Helm 渲染时 urlquery 对密码做 URL 编码，防止密码含 @ / : # 等特殊字符导致解析错误（PIT-022）
              value: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresHost .Values.config.postgresDb | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.schedulerService.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.schedulerService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.schedulerService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.schedulerService.resources | nindent 12 }}
