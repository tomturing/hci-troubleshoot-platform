{{- if .Values.networkPolicy.enabled }}
# =============================================================================
# NetworkPolicy — 最小权限网络隔离
# 策略：Postgres / Redis 只允许后端服务 Pod 访问，拒绝其他流量
# =============================================================================

# ── Postgres：只允许后端服务入站 ──────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-allow-backend
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - api-gateway
                  - case-service
                  - conversation-service
                  - scheduler-service
      ports:
        - protocol: TCP
          port: 5432
---
# ── Redis：只允许后端服务入站 ─────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-allow-backend
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - api-gateway
                  - case-service
                  - conversation-service
                  - scheduler-service
      ports:
        - protocol: TCP
          port: 6379
---
# ── 默认拒绝：Postgres / Redis 不允许来自其他命名空间 ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-external-db-access
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - postgres
          - redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}   # 仅允许同命名空间内已明确放行的 Pod
{{- end }}
