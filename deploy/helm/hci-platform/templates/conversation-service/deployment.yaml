apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation-service
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "conversation-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.conversationService.replicaCount }}
  revisionHistoryLimit: 3  # 只保留最近 3 个 ReplicaSet，避免空 RS 僵尸积累
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "conversation-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "conversation-service" "Release" .Release "Chart" .Chart) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.conversationService.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "conversation-service") | nindent 6 }}
      {{- if .Values.conversationService.externalDns }}
      # 同时保留 K8s 内部 DNS（kube-dns）和公网 DNS，确保内部服务名可解析
      # 且 open.bigmodel.cn 等外部域名能绕过 Clash fake-IP 正常连通
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.43.0.10
          - 114.114.114.114
          - 1.2.4.8
        searches:
          - {{ printf "%s.svc.cluster.local" (include "hci.namespace" .) | quote }}
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      {{- end }}
      containers:
        - name: conversation-service
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.conversationService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.conversationService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hci-common-config
            - secretRef:
                name: hci-secrets
          env:
            - name: SERVICE_NAME
              value: "conversation-service"
            - name: SERVICE_PORT
              value: {{ .Values.conversationService.port | quote }}
            - name: DATABASE_URL
              # 使用 Helm 渲染时 urlquery 对密码做 URL 编码，防止密码含 @ / : # 等特殊字符导致解析错误（PIT-022）
              value: {{ printf "postgresql+asyncpg://%s:%s@%s:5432/%s" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresHost .Values.config.postgresDb | quote }}
            # ── Phase 3: ReAct 引擎环境变量 ──────────────────────────────────────────
            - name: REACT_ENABLED
              value: {{ .Values.conversationService.reactEnabled | default "false" | quote }}
            - name: SCP_BASE_URL
              value: {{ .Values.scpBaseUrl | default "" | quote }}
            - name: SCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: SCP_API_KEY
                  optional: true          # dev 环境无 SCP 时允许 Pod 正常启动
            - name: HCI_SSH_USER
              value: {{ .Values.hciSsh.user | default "admin" | quote }}
            - name: HCI_SSH_KEY_PATH
              value: {{ .Values.hciSsh.keyPath | default "" | quote }}
            - name: HCI_SSH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: HCI_SSH_PASSWORD
                  optional: true          # 使用密钥时此字段可为空
            - name: OPS_AGENT_BASE_URL
              value: {{ (.Values.opsAgent | default dict).baseUrl | default "http://ops-agent-service:8006" | quote }}
            - name: OPS_AGENT_ENABLED
              value: {{ (.Values.opsAgent | default dict).enabled | default false | quote }}
            - name: OPS_AGENT_READ_TIMEOUT_SEC
              value: {{ (.Values.opsAgent | default dict).readTimeoutSec | default "300.0" | quote }}
            - name: OPS_AGENT_FALLBACK_ASSISTANT_TYPE
              value: {{ (.Values.opsAgent | default dict).fallbackAssistantType | default "glm-5" | quote }}
          # J-2: 三级探针分级健康检查，避免 AI 健康检查导致超时
          livenessProbe:
            httpGet:
              path: /health/live      # 只检查进程存活
              port: {{ .Values.conversationService.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready     # 检查 DB + KB，不检查 AI
              port: {{ .Values.conversationService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup   # 检查 DB 初始化完成
              port: {{ .Values.conversationService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3         # startup 也需要 timeout，避免 DB 连接慢时超时
            failureThreshold: 30
          resources:
            {{- toYaml .Values.conversationService.resources | nindent 12 }}
