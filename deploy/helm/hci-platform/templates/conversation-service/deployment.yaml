apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation-service
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "conversation-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.conversationService.replicaCount }}
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "conversation-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "conversation-service" "Release" .Release "Chart" .Chart) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.conversationService.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "conversation-service") | nindent 6 }}
      {{- if .Values.conversationService.externalDns }}
      # 同时保留 K8s 内部 DNS（kube-dns）和公网 DNS，确保内部服务名可解析
      # 且 open.bigmodel.cn 等外部域名能绕过 Clash fake-IP 正常连通
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.43.0.10
          - 114.114.114.114
          - 1.2.4.8
        searches:
          - hci-troubleshoot.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      {{- end }}
      containers:
        - name: conversation-service
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.conversationService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.conversationService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hci-common-config
            - secretRef:
                name: hci-secrets
          env:
            - name: SERVICE_NAME
              value: "conversation-service"
            - name: SERVICE_PORT
              value: {{ .Values.conversationService.port | quote }}
            - name: DATABASE_URL
              # 使用 Helm 渲染时 urlquery 对密码做 URL 编码，防止密码含 @ / : # 等特殊字符导致解析错误（PIT-022）
              value: {{ printf "postgresql+asyncpg://%s:%s@postgres:5432/%s" .Values.config.postgresUser (.Values.secrets.postgresPassword | urlquery) .Values.config.postgresDb | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.conversationService.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.conversationService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.conversationService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.conversationService.resources | nindent 12 }}
          {{- if .Values.conversationService.aiClientPatch.enabled }}
          volumeMounts:
            - name: ai-client-override
              mountPath: /app/app/services/ai_client.py
              subPath: ai_client.py
          {{- end }}
      {{- if .Values.conversationService.aiClientPatch.enabled }}
      volumes:
        - name: ai-client-override
          configMap:
            name: conversation-service-ai-client
      {{- end }}
