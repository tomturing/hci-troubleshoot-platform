{{- if .Values.conversationService.aiClientPatch.enabled }}
# =============================================================================
# conversation-service ai_client.py 临时补丁 ConfigMap
# -----------------------------------------------------------------------------
# 背景：镜像中的旧版 ai_client.py 使用硬编码 60s 读超时，LLM+RAG 场景下会超时。
# 补丁：将该文件覆盖挂载到容器内，读超时改为通过 AI_CLIENT_READ_TIMEOUT_SEC 环境变量控制。
#
# ⚠️  TODO: 当 pypi 可访问时，重新构建 conversation-service 镜像（源代码已修复），
#          然后将 conversationService.aiClientPatch.enabled 改为 false 并 helm upgrade。
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: conversation-service-ai-client
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  ai_client.py: |
{{ .Files.Get "files/ai_client.py" | indent 4 }}
{{- end }}
