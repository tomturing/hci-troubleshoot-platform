{{- if and (ne .Values.global.domain "hci.local") (eq .Values.secrets.postgresPassword "dev_password_123") -}}
  {{- fail "❌ 检测到非开发域名，但 secrets.postgresPassword 仍为默认弱密码 'dev_password_123'，请在 override 文件中设置强密码。" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: hci-secrets
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.secrets.openclawToken | quote }}
  ZAI_API_KEY: {{ .Values.secrets.zaiApiKey | quote }}
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
  # 内部 API 鉴权（LearningClaw / ProductionClaw 调用内部服务）
  INTERNAL_API_TOKEN: {{ .Values.secrets.internalApiToken | quote }}
{{- if .Values.secrets.ghcrToken }}
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull-secret
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf "{\"auths\":{\"ghcr.io\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.global.imagePullUser .Values.secrets.ghcrToken (printf "%s:%s" .Values.global.imagePullUser .Values.secrets.ghcrToken | b64enc) | b64enc }}
{{- end }}
