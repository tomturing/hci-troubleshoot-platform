{{- if .Values.openclaw.enabled }}
# OpenClaw AI助手 — Deployment + Service (容器化部署)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "openclaw" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "openclaw" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "openclaw" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "openclaw") | nindent 6 }}
      containers:
        - name: openclaw
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.openclaw.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.openclaw.port }}
              protocol: TCP
          env:
            - name: HOME
              value: "/home/node"
            - name: TERM
              value: "xterm-256color"
            - name: OPENCLAW_SKIP_CANVAS_HOST
              value: "1"
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: ZAI_API_KEY
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
          volumeMounts:
            - name: openclaw-home
              mountPath: /home/node
            - name: openclaw-tmp
              mountPath: /tmp/openclaw
          command: ["node", "dist/index.js", "gateway", "--allow-unconfigured", "--bind", "lan", "--port", "{{ .Values.openclaw.port }}"]
          livenessProbe:
            tcpSocket:
              port: {{ .Values.openclaw.port }}
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: {{ .Values.openclaw.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.openclaw.resources | nindent 12 }}
      volumes:
        - name: openclaw-home
          hostPath:
            # 宿主机 /home/bot 包含 .openclaw/ 配置目录，挂入容器 /home/node
            # 容器内 HOME=/home/node，openclaw 自动读取 /home/node/.openclaw/openclaw.json
            path: /home/bot
            type: DirectoryOrCreate
        - name: openclaw-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "openclaw" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.openclaw.port }}
      targetPort: {{ .Values.openclaw.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "hci.selectorLabels" (dict "name" "openclaw" "Release" .Release) | nindent 4 }}
{{- end }}
