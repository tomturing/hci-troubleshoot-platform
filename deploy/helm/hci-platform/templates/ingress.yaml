{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hci-ingress
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
  annotations:
    # entrypoints 名称为 "web"，对应 Traefik 内部监听端口
    # 宿主机对外端口由 HelmChartConfig (traefik-custom.yaml) 控制（当前: 4888）
    # 修改对外端口只需改 HelmChartConfig，此处注解无需变更
    traefik.ingress.kubernetes.io/router.entrypoints: web
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if .Values.global.domain }}
    - host: "api.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
    - host: "admin.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: {{ .Values.adminUI.port }}
    - host: "{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-ui
                port:
                  number: {{ .Values.customerUI.port }}
    {{- if .Values.observability.enabled }}
    - host: "grafana.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    {{- end }}
    {{- else }}
    {{- /* 路径路由模式：如果设置了 publicUrl，提取 host 部分作为绑定；否则通配匹配 */}}
    {{- $host := "" }}
    {{- if .Values.global.publicUrl }}
      {{- $host = .Values.global.publicUrl | trimPrefix "https://" | trimPrefix "http://" | regexFind "^[^/]+" }}
    {{- end }}
    - {{- if $host }} host: {{ $host | quote }}
      {{- end }}
      http:
        paths:
          # 后端 API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          # WebSocket
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          # 客户端与管理端（因无 host 路由，fallback 方案只能同时发配至其中一个或用 path 区分。为了后兼容，保留旧版）
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: {{ .Values.adminUI.port }}
          # OpenClaw WebUI（子路径直接转发，资源使用相对路径无需 StripPrefix）
          - path: /openclaw
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  number: {{ .Values.openclaw.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-ui
                port:
                  number: {{ .Values.customerUI.port }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
