{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hci-ingress
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
  annotations:
    # entrypoints 名称为 "web"，对应 Traefik 内部监听端口
    # 宿主机对外端口由 HelmChartConfig (traefik-custom.yaml) 控制（当前: 4888）
    # 修改对外端口只需改 HelmChartConfig，此处注解无需变更
    traefik.ingress.kubernetes.io/router.entrypoints: web
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if eq .Values.global.routingMode "subdomain" }}
    {{- /* 子域名路由模式：每个服务独占一个子域名，要求 DNS 有通配符记录 *.domain */}}
    - host: "api.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
    - host: "admin.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: {{ .Values.adminUI.port }}
    - host: "{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-ui
                port:
                  number: {{ .Values.customerUI.port }}
    {{- else }}
    {{- /* 路径路由模式（默认）：单域名，路径区分服务，只需一条 A 记录 */}}
    {{- $host := "" }}
    {{- if .Values.global.publicUrl }}
      {{- /* 提取 hostname，去掉协议前缀和端口（Ingress host 字段不能含端口） */}}
      {{- $host = .Values.global.publicUrl | trimPrefix "https://" | trimPrefix "http://" | regexFind "^[^/:]+" }}
    {{- end }}
    - {{- if $host }} host: {{ $host | quote }}
      {{- end }}
      http:
        paths:
          # 后端 API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          # WebSocket
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: {{ .Values.apiGateway.port }}
          # 客户端与管理端（因无 host 路由，fallback 方案只能同时发配至其中一个或用 path 区分。为了后兼容，保留旧版）
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: {{ .Values.adminUI.port }}
          - path: /openclaw
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  number: {{ .Values.openclaw.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: customer-ui
                port:
                  number: {{ .Values.customerUI.port }}
    {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
