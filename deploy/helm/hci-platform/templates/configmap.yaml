apiVersion: v1
kind: ConfigMap
metadata:
  name: hci-common-config
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
{{- $defaultAssistantRegistry := "{\"htp-agent\":{\"base_url\":\"https://coding.dashscope.aliyuncs.com/v1\",\"provider_api_key\":\"{{ .Values.secrets.llmApiKey }}\",\"model\":\"glm-5\",\"warm_pool_size\":0,\"max_pool_size\":0,\"display_name\":\"HTP Agent (GLM-5)\",\"description\":\"HCI智能排障平台核心助手\",\"is_default\":true,\"enabled\":true},\"ops-agent\":{\"warm_pool_size\":0,\"max_pool_size\":0,\"base_url\":\"http://ops-agent-service:8006\",\"display_name\":\"Ops Agent (GLM-5)\",\"description\":\"基于SOP知识库的智能排障助手\",\"enabled\":true},\"pai-agent\":{\"name\":\"PydanticAI\",\"display_name\":\"PAI Agent (GLM-5)\",\"description\":\"基于pydantic-ai框架的排障助手\",\"base_url\":\"http://conversation-service:8002\",\"warm_pool_size\":0,\"max_pool_size\":0,\"enabled\":true,\"is_default\":false}}" }}
data:
  # 数据库（非敏感）
  POSTGRES_DB: {{ .Values.config.postgresDb | quote }}
  POSTGRES_USER: {{ .Values.config.postgresUser | quote }}
  # Redis
  REDIS_URL: {{ .Values.config.redisUrl | quote }}
  # 服务间通信（K8s 内部 DNS）
  CASE_SERVICE_URL: "http://case-service:{{ .Values.caseService.port }}"
  CONVERSATION_SERVICE_URL: "http://conversation-service:{{ .Values.conversationService.port }}"
  SCHEDULER_SERVICE_URL: "http://scheduler-service:{{ .Values.schedulerService.port }}"
  # LLM 配置（统一使用 dashscope 网关）
  LLM_BASE_URL: {{ .Values.config.llmBaseUrl | default "https://coding.dashscope.aliyuncs.com/v1" | quote }}
  LLM_DEFAULT_MODEL: {{ .Values.config.llmDefaultModel | default "glm-5" | quote }}
  GLM_MODEL: {{ .Values.config.llmDefaultModel | default "glm-5" | quote }}
  AI_COMPLETIONS_PATH: {{ .Values.config.aiCompletionsPath | default "/chat/completions" | quote }}
  # 可观测性
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.config.otelEndpoint | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  # Scheduler
  K8S_NAMESPACE: {{ .Values.config.k8sNamespace | quote }}
  K8S_IMAGE_PULL_SECRET: {{ .Values.global.imagePullSecretName | quote }}
  # Scheduler 可选配置（未设置时不渲染空字段）
  {{- if .Values.config.warmPoolSize }}
  WARM_POOL_SIZE: {{ .Values.config.warmPoolSize | quote }}
  {{- end }}
  {{- if .Values.config.maxPoolSize }}
  MAX_POOL_SIZE: {{ .Values.config.maxPoolSize | quote }}
  {{- end }}
  {{- if .Values.config.podIdleTimeout }}
  POD_IDLE_TIMEOUT: {{ .Values.config.podIdleTimeout | quote }}
  {{- end }}
  # AI 客户端超时（秒）
  AI_CLIENT_READ_TIMEOUT_SEC: {{ .Values.config.aiClientReadTimeoutSec | default "120.0" | quote }}
  # 服务地址
  KB_SERVICE_URL: {{ .Values.config.kbServiceUrl | default "http://kb-service:8004" | quote }}
  KB_ENABLED: {{ .Values.kbService.enabled | toString | quote }}
  # 多助手注册表（3 个助手：htp-agent、ops-agent、pai-agent）
  ASSISTANT_REGISTRY_JSON: {{ (.Values.config.assistantRegistryJson | default $defaultAssistantRegistry) | quote }}
  # 助手选择器显示控制（auto/true/false）
  ASSISTANT_SHOW_SELECTOR: {{ .Values.config.assistantShowSelector | default "auto" | quote }}
