{{- if .Values.observability.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.podLabels" (dict "name" "grafana" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "grafana" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "grafana" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image }}
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.secrets.grafanaAdminPassword | quote }}
            - name: GF_SECURITY_ALLOW_EMBEDDING
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            {{- if .Values.global.publicUrl }}
            {{- /* 路径路由模式：publicUrl 形如 http://host:port，提取 host 部分作为 domain */}}
            - name: GF_SERVER_DOMAIN
              value: {{ .Values.global.publicUrl | trimPrefix "https://" | trimPrefix "http://" | quote }}
            - name: GF_SERVER_ROOT_URL
              value: {{ printf "%s/grafana/" .Values.global.publicUrl | quote }}
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            {{- else if .Values.global.domain }}
            - name: GF_SERVER_DOMAIN
              value: {{ printf "grafana.%s" .Values.global.domain | quote }}
            - name: GF_SERVER_ROOT_URL
              value: {{ printf "http://grafana.%s/" .Values.global.domain | quote }}
            {{- else }}
            - name: GF_SERVER_ROOT_URL
              value: "%(protocol)s://%(domain)s/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.observability.grafana.resources | nindent 12 }}
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-provisioning
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.podLabels" (dict "name" "grafana" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    {{- include "hci.selectorLabels" (dict "name" "grafana" "Release" .Release) | nindent 4 }}
{{- end }}
