{{- if .Values.observability.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.podLabels" (dict "name" "promtail" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "promtail" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "promtail" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: {{ .Values.observability.promtail.image }}
          args: ["-config.file=/etc/promtail/config.yml"]
          env:
            # 注入真实节点名，避免 Promtail 错误地使用 Pod 名（HOSTNAME）作为节点过滤条件
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            {{- toYaml .Values.observability.promtail.resources | nindent 12 }}
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail/config.yml
              subPath: config.yml
            - name: pods-log
              mountPath: /var/log/pods
              readOnly: true
            # Docker runtime 下日志文件是软链接，实际内容在 /var/lib/docker/containers
            - name: docker-containers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: run-promtail
              mountPath: /run/promtail
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: pods-log
          hostPath:
            path: /var/log/pods
        # Docker runtime：挂载 Docker 容器日志目录以解析软链接
        - name: docker-containers
          hostPath:
            path: /var/lib/docker/containers
        - name: run-promtail
          hostPath:
            path: /run/promtail
---
# Promtail ServiceAccount + ClusterRole (读取 Pod 元数据)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
{{- /*
  ClusterRole/ClusterRoleBinding 已迁移到 hci-platform-infra Chart 统一管理。
  保留条件开关，仅在 clusterResources.manage=true 时渲染（用于本地调试）。
*/ -}}
{{- if .Values.clusterResources.manage }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
  labels:
    {{- include "hci.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
  labels:
    {{- include "hci.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: {{ .Values.observability.namespace }}
roleRef:
  kind: ClusterRole
  name: promtail
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}
