{{- if and .Values.observability.enabled .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  # 注意：此 Ingress 必须和 grafana Service 在同一命名空间（hci-observability）
  # Traefik 扫描全命名空间 Ingress，因此跨命名空间路由通过此方式实现
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if eq .Values.global.routingMode "subdomain" }}
    {{- /* 子域名路由模式：grafana 独占 grafana.<domain> */}}
    - host: "grafana.{{ .Values.global.domain }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    {{- else }}
    {{- /* 路径路由模式（默认）：通配 host，/grafana 子路径 */}}
    - http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 3000
    {{- end }}
{{- end }}
