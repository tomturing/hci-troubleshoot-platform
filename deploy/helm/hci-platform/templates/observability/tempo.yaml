{{- if and .Values.observability.enabled .Values.observabilityLayer.manage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.podLabels" (dict "name" "tempo" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "tempo" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "tempo" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      containers:
        - name: tempo
          image: {{ .Values.observability.tempo.image }}
          args: ["-config.file=/etc/tempo.yaml"]
          ports:
            - containerPort: 3200
              protocol: TCP
              name: query
            - containerPort: 4317
              protocol: TCP
              name: otlp-grpc
            - containerPort: 4318
              protocol: TCP
              name: otlp-http
          readinessProbe:
            httpGet:
              path: /ready
              port: 3200
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.observability.tempo.resources | nindent 12 }}
          volumeMounts:
            - name: tempo-config
              mountPath: /etc/tempo.yaml
              subPath: tempo.yaml
            - name: tempo-data
              mountPath: /tmp/tempo
      volumes:
        - name: tempo-config
          configMap:
            name: tempo-config
        - name: tempo-data
          persistentVolumeClaim:
            claimName: tempo-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: {{ .Values.observability.tempo.storageClass }}
  resources:
    requests:
      storage: {{ .Values.observability.tempo.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.podLabels" (dict "name" "tempo" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3200
      targetPort: 3200
      protocol: TCP
      name: query
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      protocol: TCP
      name: otlp-http
  selector:
    {{- include "hci.selectorLabels" (dict "name" "tempo" "Release" .Release) | nindent 4 }}
{{- end }}
