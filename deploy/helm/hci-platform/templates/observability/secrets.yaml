{{- if .Values.observability.enabled }}
# =============================================================================
# Grafana 独立 Secret（hci-observability 命名空间）
# 原因：hci-secrets 在 hci-troubleshoot 命名空间，K8s Secret 不能跨命名空间引用
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
{{- end }}
