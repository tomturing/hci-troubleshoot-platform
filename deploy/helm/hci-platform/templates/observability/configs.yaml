{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  tempo.yaml: |
    stream_over_http_enabled: true
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"
            http:
              endpoint: "0.0.0.0:4318"

    ingester:
      max_block_duration: 1m

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: hci-k3s

    storage:
      trace:
        backend: local
        local:
          path: /tmp/tempo/blocks

    overrides:
      defaults:
        metrics_generator:
          processors: [service-graphs, span-metrics]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Docker runtime 使用 JSON 格式（containerd/CRI 才用 cri: {}）
          - docker: {}
        relabel_configs:
          # 先过滤：只采集有 app.kubernetes.io/name 标签的 Pod（排除无标签的系统 Pod）
          - action: drop
            regex: ""
            source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
          # 设置日志文件路径（关键！缺少此规则 Promtail 不会读取任何文件）
          - action: replace
            source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            separator: /
            regex: (.+)/(.+)
            replacement: /var/log/pods/*$1/$2/*.log
            target_label: __path__
          # 设置 Label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          # service_name 与 OTel 保持一致，方便 Grafana 统一查询
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: service_name
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: true
        editable: true

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo:3200
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: "-1m"
            spanEndTimeShift: "1m"
            tags: ["pod", "namespace", "app"]
            filterByTraceID: true
            filterBySpanID: false
          serviceMap:
            datasourceUid: loki
          nodeGraph:
            enabled: true
{{- end }}
