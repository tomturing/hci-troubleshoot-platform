apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "agent-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.agentService.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "agent-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "agent-service" "Release" .Release "Chart" .Chart) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.agentService.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "agent-service") | nindent 6 }}
      {{- if .Values.agentService.externalDns }}
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.43.0.10
          - 114.114.114.114
          - 1.2.4.8
        searches:
          - {{ printf "%s.svc.cluster.local" (include "hci.namespace" .) | quote }}
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      {{- end }}
      containers:
        - name: agent-service
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.agentService.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - containerPort: {{ .Values.agentService.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: hci-common-config
            - secretRef:
                name: hci-secrets
          env:
            - name: SERVICE_NAME
              value: "agent-service"
            - name: SERVICE_PORT
              value: {{ .Values.agentService.port | quote }}
            # GLM 模型配置
            - name: GLM_MODEL
              value: {{ .Values.agentService.glmModel | default "glm-5" | quote }}
            - name: REACT_ENABLED
              value: {{ .Values.agentService.reactEnabled | default "false" | quote }}
            # ops-agent 集成
            - name: OPS_AGENT_BASE_URL
              value: {{ (.Values.opsAgent | default dict).baseUrl | default "http://ops-agent-service:8006" | quote }}
            - name: OPS_AGENT_ENABLED
              value: {{ (.Values.opsAgent | default dict).enabled | default false | quote }}
            - name: OPS_AGENT_READ_TIMEOUT_SEC
              value: {{ (.Values.opsAgent | default dict).readTimeoutSec | default "300.0" | quote }}
            - name: OPS_AGENT_FALLBACK_ASSISTANT_TYPE
              value: {{ (.Values.opsAgent | default dict).fallbackAssistantType | default "glm-5" | quote }}
            # pydantic-ai C 大脑
            - name: PYDANTIC_AI_ENABLED
              value: {{ .Values.agentService.pydanticAiEnabled | default "false" | quote }}
            - name: CONFIRM_TIMEOUT_SEC
              value: {{ .Values.agentService.confirmTimeoutSec | default "120" | quote }}
          livenessProbe:
            httpGet:
              path: /v1/agent/health
              port: {{ .Values.agentService.port }}
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/agent/health
              port: {{ .Values.agentService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /v1/agent/health
              port: {{ .Values.agentService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            {{- toYaml .Values.agentService.resources | nindent 12 }}
