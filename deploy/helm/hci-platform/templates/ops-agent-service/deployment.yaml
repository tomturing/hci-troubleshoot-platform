{{- if .Values.opsAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ops-agent-service
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "ops-agent-service" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: 3
  {{- with .Values.opsAgent.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "ops-agent-service" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "ops-agent-service" "Release" .Release "Chart" .Chart) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/ops-agent-service/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8006"
        prometheus.io/path: "/metrics"
    spec:
      {{- include "hci.workloadPodSpecExtras" (dict "root" . "name" "ops-agent-service") | nindent 6 }}
      containers:
        - name: ops-agent
          image: {{ .Values.opsAgent.image.repository }}:{{ .Values.opsAgent.image.tag | default "latest" }}
          imagePullPolicy: {{ .Values.opsAgent.image.pullPolicy | default (ternary "Always" "IfNotPresent" (eq (.Values.opsAgent.image.tag | default "latest") "latest")) }}
          {{- include "hci.workloadContainerSecurityContext" . | nindent 10 }}
          ports:
            - name: http
              containerPort: 8006
              protocol: TCP
            {{- if .Values.opsAgent.opsWeb.enabled }}
            - name: ops-web
              containerPort: 8501
              protocol: TCP
            {{- end }}
          env:
            - name: HOME
              value: /app
            - name: OPS_CONFIG_PATH
              value: /app/ops_config.yaml
            # per-session trajectory 根目录（与 brain_adapter.py OPS_AGENT_TRAJECTORY_DIR 一致）
            # 挂载到 hostPath 保证进程重启后历史不丢失（pod 重调度仍在同一节点时有效）
            - name: OPS_AGENT_TRAJECTORY_DIR
              value: /data/ops-agent-trajectories
            - name: HCI_TP_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.opsAgent.otelEndpoint | default "http://hci-platform-otel-collector:4318" | quote }}
            # dashscope openai_compatible provider 的 API key，来自 hci-secrets.SCP_API_KEY
            - name: OPENAI_COMPATIBLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: SCP_API_KEY
            {{- if .Values.opsAgent.opsWeb.enabled }}
            - name: STREAMLIT_SERVER_PORT
              value: "8501"
            - name: STREAMLIT_SERVER_ADDRESS
              value: "0.0.0.0"
            - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
              value: "false"
            {{- end }}
          {{- if .Values.opsAgent.opsWeb.enabled }}
          # 单容器方案：同时启动 ops-server (后台) 和 ops-web (前台)
          command:
            - /bin/bash
            - -c
            - |
              # 信号处理：确保后台进程随容器终止
              cleanup() {
                echo "Received signal, stopping ops-server (PID $OPS_SERVER_PID)..."
                kill $OPS_SERVER_PID 2>/dev/null
                exit 0
              }
              trap cleanup SIGTERM SIGINT

              # 启动 ops-server (后台)
              /app/.venv/bin/python3 /app/.venv/bin/ops-server &
              OPS_SERVER_PID=$!
              echo "ops-server started with PID $OPS_SERVER_PID"

              # 等待 ops-server 就绪（用 Python 代替 curl，镜像无 curl）
              READY=false
              for i in {1..30}; do
                if python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8006/health')" 2>/dev/null; then
                  echo "ops-server is ready"
                  READY=true
                  break
                fi
                sleep 1
              done

              # ops-server 未就绪则快速失败
              if [ "$READY" = false ]; then
                echo "ERROR: ops-server failed to start within 30 seconds"
                exit 1
              fi

              # 启动 ops-web (前台，作为主进程)
              exec /app/.venv/bin/python3 /app/.venv/bin/streamlit run /app/ops_web/streamlit_app.py \
                --server.port=8501 \
                --server.address=0.0.0.0
          workingDir: /app
          {{- end }}
          volumeMounts:
            - name: ops-config
              mountPath: /app/ops_config.yaml
              subPath: ops_config.yaml
            # SOP 数据目录挂载（HostPath 方案）
            # 宿主机目录由 .Values.opsAgent.sopDataHostPath 配置
            # 数据更新：修改宿主机文件 + 重启 Pod
            - name: sop-data
              mountPath: /app/data/case_sop_data/hci/sop
            # trajectories 目录（emptyDir 解决权限问题，供 ops-web 使用）
            - name: trajectories
              mountPath: /app/.trajectories
            # per-session trajectory 数据目录（HostPath 持久化，供 REST API 会话恢复使用）
            # 对应 OPS_AGENT_TRAJECTORY_DIR 环境变量
            - name: trajectory-data
              mountPath: /data/ops-agent-trajectories
          resources:
            {{- (.Values.opsAgent.resources | default (dict "requests" (dict "cpu" "100m" "memory" "128Mi") "limits" (dict "cpu" "500m" "memory" "512Mi"))) | toYaml | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: ops-config
          configMap:
            name: ops-agent-config
        # SOP 数据 HostPath 挂载
        # 支持手动更新 SOP 数据，ops-agent 镜像与 SOP 数据解耦
        - name: sop-data
          hostPath:
            path: {{ .Values.opsAgent.sopDataHostPath | default "/aihci/ops-agent/data/case_sop_data/hci/sop" }}
            type: DirectoryOrCreate
        - name: trajectories
          emptyDir: {}
        # per-session trajectory 数据持久化（HostPath 方案，与 sop-data 保持一致）
        # pod 重启后仍在同一节点时可从磁盘恢复 LLM 消息历史
        - name: trajectory-data
          hostPath:
            path: {{ .Values.opsAgent.trajectoryDataHostPath | default "/data/ops-agent-trajectories" }}
            type: DirectoryOrCreate
{{- end }}