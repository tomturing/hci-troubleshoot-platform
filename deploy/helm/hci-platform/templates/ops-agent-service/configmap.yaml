apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-agent-config
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  ops_config.yaml: |
    agents:
      enable_lakeview: false
      ops_agent:
        model: glm47-openrouter
        max_steps: 500
        sop_catalog_path: data/case_sop_data/af/sop/node_sops.jsonl
        query_sub_agent:
          model: glm47-openrouter
          max_steps: 80
          tool_call_budget: 40
          budget_warning_threshold: 10

    model_providers:
      openrouter-example:
        api_key: ""
        base_url: https://openrouter.ai/api/v1
        provider: openrouter

    models:
      glm47-openrouter:
        model_provider: openrouter-example
        model: z-ai/glm-4.7
        max_tokens: 8192
        temperature: 0.8
        top_p: 0.95
        top_k: 0
        max_retries: 3
        parallel_tool_calls: false
        enable_thinking: false
