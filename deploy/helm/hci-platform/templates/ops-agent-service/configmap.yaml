apiVersion: v1
kind: ConfigMap
metadata:
  name: ops-agent-config
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  ops_config.yaml: |
    agents:
      enable_lakeview: false
      ops_agent:
        model: glm4-flash-openclaw
        max_steps: 500
        sop_catalog_path: data/case_sop_data/af/sop/node_sops.jsonl
        query_sub_agent:
          model: glm4-flash-openclaw
          max_steps: 80
          tool_call_budget: 40
          budget_warning_threshold: 10

    # 使用与 htp conversation-service 相同的 openclaw 内部网关
    # OPENAI_COMPATIBLE_API_KEY 由 Deployment env 注入（来自 hci-secrets.OPENCLAW_API_KEY）
    model_providers:
      openclaw-gw:
        api_key: ""
        base_url: http://openclaw:18789
        provider: openai_compatible

    models:
      glm4-flash-openclaw:
        model_provider: openclaw-gw
        model: glm-4-flash
        max_tokens: 8192
        temperature: 0.8
        top_p: 0.95
        top_k: 0
        max_retries: 3
        parallel_tool_calls: false
        enable_thinking: false
