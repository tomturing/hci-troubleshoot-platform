apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  namespace: {{ include "hci.namespace" . }}
  labels:
    {{- include "hci.podLabels" (dict "name" "admin-ui" "Release" .Release "Chart" .Chart) | nindent 4 }}
spec:
  replicas: {{ .Values.adminUI.replicaCount }}
  selector:
    matchLabels:
      {{- include "hci.selectorLabels" (dict "name" "admin-ui" "Release" .Release) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hci.podLabels" (dict "name" "admin-ui" "Release" .Release "Chart" .Chart) | nindent 8 }}
    spec:
      containers:
        - name: admin-ui
          image: {{ include "hci.image" (dict "global" .Values.global "image" .Values.adminUI.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.adminUI.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.adminUI.port }}
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.adminUI.port }}
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.adminUI.resources | nindent 12 }}
