# =============================================================================
# hci-platform-data — 数据层默认配置
# 此 Chart 独立管理 PostgreSQL 和 Redis，不随业务版本迭代变更。
# PVC 保护策略：StatefulSet 带 helm.sh/resource-policy: keep；ArgoCD Application
# 中 prune: false，两重保障防止数据卷被意外删除。
# =============================================================================

# ======================== PostgreSQL ========================================
postgres:
  enabled: true
  image: pgvector/pgvector:pg15 # 含 pgvector 扩展，支持向量检索
  storage: 5Gi
  # ⚠️  StorageClass 说明：
  #   - 存量安装：PVC storageClassName 创建后不可变，upgrade 无法修改
  #     变更须人工操作：1) 备份数据  2) 删除 StatefulSet + PVC  3) helm upgrade  4) 恢复数据
  #   - 全新安装：local-path-retain 在 PVC 删除后保留 PV 数据目录，防止意外数据丢失
  storageClass: local-path-retain
  # NodePort 对外暴露端口（仅 dev 环境需要，生产环境留空）
  nodePort: 30054
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  # pg_dump 定时全量备份（每天 UTC 02:00，保留 30 天）
  backup:
    enabled: true
    schedule: "0 2 * * *"
    hostPath: "/srv/hci/backups/postgres"

# ======================== Redis =============================================
redis:
  enabled: true
  image: redis:7
  storage: 1Gi
  storageClass: local-path
  resources:
    requests:
      cpu: "50m"
      memory: "16Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ======================== 共用配置（与 hci-platform chart 保持一致）===========
# postgres 健康探针需要 DB 名称和用户名；这两项与 hci-common-config ConfigMap 匹配
config:
  postgresDb: hci_troubleshoot
  postgresUser: hci_admin

# ======================== B-2: DB 迁移 pre-upgrade Job =====================
# ⚠️  Alembic 迁移 Job 已废弃（2026-04-08）
# 数据库迁移统一由 hci-platform 的 dbmate PreSync Hook 负责。
# 此配置块保留作历史参考，enabled 必须保持 false，禁止改为 true。
dbMigrate:
  enabled: false # 已废弃 — dbmate 是唯一权威迁移工具，禁止启用
  image: "ghcr.io/tomturing/hci-troubleshoot-platform/hci-case-service:latest"
  imagePullPolicy: IfNotPresent

# ======================== B-3: DB 密码漂移预检 Job ========================
# 在 helm upgrade 之前验证 K8s Secret 中的密码与 DB 实际密码一致。
# 密码不一致时阻断部署，避免服务启动后因密码错误导致连接失败。
dbPasswordCheck:
  enabled: true # 默认启用，可在确认密码正确后临时禁用以加速部署
