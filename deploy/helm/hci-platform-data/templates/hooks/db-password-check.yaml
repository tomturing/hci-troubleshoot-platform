# =============================================================================
# B-3: DB 密码漂移预检 Job
#
# 功能：在 db-migrate Job 之前（hook-weight: -10）执行，验证 K8s Secret 中的密码
#       能否连接实际数据库。若连接失败，说明 Secret 与 DB 实际密码不一致（密码漂移），
#       Job 报错阻断部署，避免后续服务启动失败。
#
# 设计依据（第一性原理）：
#   1. 单一权威来源：密码只存在 hci-secrets.POSTGRES_PASSWORD 一处，无冗余
#   2. 业界最佳实践：与 PostgreSQL Operator、Redis Operator 设计一致，不存储完整连接字符串
#   3. 动态构建连接：在运行时从 Secret 读取密码 + Helm values 参数拼接 DATABASE_URL
#   4. 跨 Chart 依赖显式声明：通过 .Values.config.* 传递参数，而非隐式假设 Secret 结构
#
# 跨 Chart 依赖：
#   - Secret `hci-secrets` 由 hci-platform chart 创建（deploy/helm/hci-platform/templates/secret.yaml）
#   - 参数 postgresUser/postgresDb 由 hci-platform-data/values.yaml 定义
# =============================================================================
{{- if .Values.dbPasswordCheck.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: db-password-check-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hci-data.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-password-check
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 180  # 允许镜像拉取时间
  template:
    metadata:
      labels:
        {{- include "hci-data.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-password-check
    spec:
      restartPolicy: Never
      containers:
        - name: password-check
          image: postgres:15
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo "[DB-PASSWORD-CHECK] 验证 K8s Secret 密码与 DB 密码是否一致..."
              # 使用动态构建的 DATABASE_URL 测试连接（连接成功即密码正确）
              if psql "${DATABASE_URL}" -c "SELECT 1;" > /dev/null 2>&1; then
                echo "[DB-PASSWORD-CHECK] ✓ 密码验证通过，无漂移"
                exit 0
              else
                echo "[DB-PASSWORD-CHECK] ✗ 密码验证失败！"
                echo "[DB-PASSWORD-CHECK] K8s Secret hci-secrets.POSTGRES_PASSWORD 无法连接数据库。"
                echo "[DB-PASSWORD-CHECK] 可能原因："
                echo "[DB-PASSWORD-CHECK]   1. Secret 中密码与 DB 实际密码不一致（密码漂移）"
                echo "[DB-PASSWORD-CHECK]   2. PostgreSQL 服务未就绪"
                echo "[DB-PASSWORD-CHECK] 解决方法："
                echo "[DB-PASSWORD-CHECK]   检查 Secret: kubectl get secret hci-secrets -n {{ .Release.Namespace }} -o jsonpath='{.data.POSTGRES_PASSWORD}'"
                echo "[DB-PASSWORD-CHECK]   或在 postgres Pod 中修改密码："
                echo "[DB-PASSWORD-CHECK]     kubectl exec -n {{ .Release.Namespace }} postgres-0 -- \\"
                echo "[DB-PASSWORD-CHECK]       psql -U postgres -c \"ALTER USER {{ .Values.config.postgresUser }} PASSWORD '<正确密码>';\""
                exit 1
              fi
          env:
            # 从单一权威来源读取密码（hci-secrets 由 hci-platform chart 创建）
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hci-secrets
                  key: POSTGRES_PASSWORD
            # 动态构建 DATABASE_URL：用户名/DB名来自 values，密码来自 Secret
            # 格式：postgres://user:password@host:port/database?sslmode=disable
            - name: DATABASE_URL
              value: "postgres://{{ .Values.config.postgresUser }}:$(POSTGRES_PASSWORD)@postgres:5432/{{ .Values.config.postgresDb }}?sslmode=disable"
{{- end }}
