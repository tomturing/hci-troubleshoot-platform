{{- if .Values.dbPasswordCheck.enabled }}
# B-3: DB 密码漂移预检 Job
# 在 db-migrate Job 之前（hook-weight: -10）执行，用 K8s Secret 中的密码验证 DB 连接。
# 若连接失败，说明 Secret 与 DB 实际密码不一致（密码漂移），Job 报错阻断部署。
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-password-check-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hci-data.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-password-check
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 60
  template:
    metadata:
      labels:
        {{- include "hci-data.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-password-check
    spec:
      restartPolicy: Never
      containers:
        - name: password-check
          image: postgres:15
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo "[DB-PASSWORD-CHECK] 验证 K8s Secret 密码与 DB 密码是否一致..."
              # 使用 Secret 中的 DATABASE_URL 测试连接（连接成功即密码正确）
              if psql "${DATABASE_URL}" -c "SELECT 1;" > /dev/null 2>&1; then
                echo "[DB-PASSWORD-CHECK] ✓ 密码验证通过，无漂移"
                exit 0
              else
                echo "[DB-PASSWORD-CHECK] ✗ 密码验证失败！"
                echo "[DB-PASSWORD-CHECK] K8s Secret 中的密码无法连接数据库，存在密码漂移。"
                echo "[DB-PASSWORD-CHECK] 解决方法："
                echo "[DB-PASSWORD-CHECK]   1. 检查 Secret hci-platform-secrets.database-url 是否正确"
                echo "[DB-PASSWORD-CHECK]   2. 或手动在 postgres Pod 中执行："
                echo "[DB-PASSWORD-CHECK]      kubectl exec -n {{ .Release.Namespace }} postgres-0 -- \\"
                echo "[DB-PASSWORD-CHECK]        psql -U postgres -c \"ALTER USER {{ .Values.config.postgresUser }} PASSWORD '<正确密码>';\""
                exit 1
              fi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hci-platform-secrets
                  key: database-url
{{- end }}
