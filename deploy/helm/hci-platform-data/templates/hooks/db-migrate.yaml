{{- if .Values.dbMigrate.enabled }}
# ⚠️  Alembic 迁移 Job 已废弃（2026-04-08）
# 数据库迁移统一由 hci-platform 的 dbmate PreSync Hook 负责。
# 本 Job 已通过 dbMigrate.enabled=false 停用，此模板仅保留作历史参考。
# 权威迁移工具：dbmate（见 deploy/helm/hci-platform/templates/hooks/）
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-alembic-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hci-data.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migration-deprecated
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 10
  template:
    metadata:
      labels:
        {{- include "hci-data.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-migration-deprecated
    spec:
      restartPolicy: Never
      containers:
        - name: noop
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "[ERROR] dbMigrate.enabled=true 是错误配置！"
              echo "[ERROR] Alembic 迁移链已于 2026-04-08 废弃，禁止再次启用。"
              echo "[ERROR] 数据库迁移统一由 hci-platform 的 dbmate PreSync Hook 负责。"
              echo "[ERROR] 正确路径：deploy/helm/hci-platform/templates/hooks/db-migrate-job.yaml"
              echo "[ERROR] 请立即将 dbMigrate.enabled 改回 false 并重新执行 helm upgrade。"
              exit 1
      {{- if .Values.global.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      {{- end }}
{{- end }}
