{{- if .Values.dbMigrate.enabled }}
# B-2: DB 迁移 Helm pre-upgrade/pre-install Job
# 在 helm upgrade 之前自动执行 Alembic 迁移，确保 schema 与应用版本同步。
# 失败时 helm upgrade 中止，防止应用与 schema 版本不一致的半漂移状态。
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hci-data.labels" . | nindent 4 }}
    app.kubernetes.io/component: db-migration
  annotations:
    "helm.sh/hook": pre-upgrade,pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "hci-data.labels" . | nindent 8 }}
        app.kubernetes.io/component: db-migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: alembic
          # 使用 case-service 镜像（包含 alembic + migration 脚本）
          image: {{ .Values.dbMigrate.image }}
          imagePullPolicy: {{ .Values.dbMigrate.imagePullPolicy | default "IfNotPresent" }}
          command:
            - /bin/sh
            - -c
            - |
              set -euo pipefail
              echo "[DB-MIGRATE] 开始执行 Alembic 迁移..."
              echo "[DB-MIGRATE] 当前 revision: $(alembic current 2>/dev/null || echo '(获取失败)')"
              alembic upgrade head
              echo "[DB-MIGRATE] 迁移完成，当前 revision: $(alembic current)"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hci-platform-secrets
                  key: database-url
      {{- if .Values.global.imagePullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.global.imagePullSecretName }}
      {{- end }}
{{- end }}
