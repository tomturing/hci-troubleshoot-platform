{{- if .Values.prometheus.enabled }}
{{- $scrapeNamespaces := .Values.scrapeNamespaces | default (list .Values.scrapeNamespace) -}}
---
# Prometheus 配置（scrapeNamespace 由 values.scrapeNamespace 指定，默认 hci）
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s

    # 从独立 ConfigMap（prometheus-alert-rules）挂载告警规则文件
    rule_files:
      - "/etc/prometheus/rules/*.yml"

    # 告警路由到 alertmanager
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    scrape_configs:
      # 通过 K8s Pod 注解自动发现业务命名空间中的服务
      - job_name: 'hci-services'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
{{- range $ns := $scrapeNamespaces }}
                - {{ $ns }}
{{- end }}
        relabel_configs:
          # 只采集带有 prometheus.io/scrape=true 注解的 Pod
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          # 使用 prometheus.io/path 注解覆盖默认的 /metrics 路径
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # 使用 prometheus.io/port 注解覆盖端口
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # 添加 pod / namespace / app 标签
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            target_label: service_name
---
# Prometheus Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  revisionHistoryLimit: 3  # 只保留最近 3 个 ReplicaSet，避免空 RS 僵尸积累
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        {{- include "hci.labels" . | nindent 8 }}
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image | default "prom/prometheus:v2.52.0" }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: rules
              mountPath: /etc/prometheus/rules
              readOnly: true
            - name: storage
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-alert-rules
        - name: storage
          emptyDir: {}
---
# Prometheus Service
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: prometheus
---
# Prometheus ServiceAccount（需要权限读取 Pod 注解）
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
{{- /*
  ClusterRole/ClusterRoleBinding 已迁移到 hci-platform-infra Chart 统一管理。
  保留条件开关，仅在 clusterResources.manage=true 时渲染（用于本地调试）。
*/ -}}
{{- if .Values.clusterResources.manage }}
---
# ClusterRole：允许 Prometheus 发现 K8s Pod
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-hci
  labels:
    {{- include "hci.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
      - endpoints
      - services
      - nodes
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources:
      - configmaps
    verbs: ["get"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-hci
  labels:
    {{- include "hci.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-hci
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: {{ .Values.namespace }}
{{- end }}
---
# Prometheus 告警规则（Pod 高频重启 + 容器 OOMKilled）
# kube_pod_container_status_restarts_total 由 kube-state-metrics 提供
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
data:
  pod-alerts.yml: |
    groups:
      - name: pod-health
        interval: 60s
        rules:
          # Pod 在1小时内重启超过3次
          - alert: PodHighRestartRate
            expr: |
              increase(kube_pod_container_status_restarts_total{
                namespace=~"hci-dev|hci-observability|argocd"
              }[1h]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{ `{{` }} $labels.namespace {{ `}}` }}/{{ `{{` }} $labels.pod {{ `}}` }} 高频重启"
              description: |
                容器 {{ `{{` }} $labels.container {{ `}}` }} 过去1小时重启 {{ `{{` }} $value | printf "%.0f" {{ `}}` }} 次（阈值: 3次）。
                请检查: kubectl logs -n {{ `{{` }} $labels.namespace {{ `}}` }} {{ `{{` }} $labels.pod {{ `}}` }} -c {{ `{{` }} $labels.container {{ `}}` }} --previous

          # 容器因内存不足被 Kill（OOMKilled）
          - alert: ContainerOOMKilled
            expr: |
              kube_pod_container_status_last_terminated_reason{
                reason="OOMKilled",
                namespace=~"hci-dev|hci-observability|argocd"
              } == 1
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "容器 {{ `{{` }} $labels.namespace {{ `}}` }}/{{ `{{` }} $labels.pod {{ `}}` }}/{{ `{{` }} $labels.container {{ `}}` }} OOMKilled"
              description: |
                容器因内存不足被终止，请检查内存 limits 设置。
                kubectl describe pod -n {{ `{{` }} $labels.namespace {{ `}}` }} {{ `{{` }} $labels.pod {{ `}}` }}
{{- end }}
