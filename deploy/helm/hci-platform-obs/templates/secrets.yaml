# =============================================================================
# Grafana 独立 Secret（hci-observability 命名空间）
# 原因：业务 namespace 的 hci-secrets 不能跨命名空间被 Grafana 引用
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
