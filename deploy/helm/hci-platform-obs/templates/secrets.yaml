# =============================================================================
# Grafana 独立 Secret（hci-observability 命名空间）
# 原因：业务 namespace 的 hci-secrets 不能跨命名空间被 Grafana 引用
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
type: Opaque
stringData:
  GF_SECURITY_ADMIN_PASSWORD: {{ .Values.secrets.grafanaAdminPassword | quote }}
---
# =============================================================================
# Alertmanager 配置 Secret（hci-observability 命名空间）
# 飞书 Webhook URL 由 hci-platform-env 环境仓库 secrets.feishuWebhookUrl 字段覆盖
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "hci.labels" . | nindent 4 }}
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: observability
type: Opaque
stringData:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: feishu-webhook
      group_by: ["alertname", "namespace", "pod"]
      group_wait: 30s
      group_interval: 2m
      repeat_interval: 30m

    receivers:
      - name: default-log
      - name: feishu-webhook
        webhook_configs:
          - url: {{ .Values.secrets.feishuWebhookUrl | quote }}
            send_resolved: true
            max_alerts: 20

    inhibit_rules:
      - source_matchers:
          - severity="critical"
        target_matchers:
          - severity="warning"
        equal: ["alertname", "namespace", "pod"]
