services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: hci-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hci_troubleshoot}
      POSTGRES_USER: ${POSTGRES_USER:-hci_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hci_admin} -d ${POSTGRES_DB:-hci_troubleshoot}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: hci-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: hci-api-gateway
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://hci_admin:dev_password_123@postgres:5432/hci_troubleshoot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CASE_SERVICE_URL: ${CASE_SERVICE_URL:-http://case-service:8001}
      CONVERSATION_SERVICE_URL: ${CONVERSATION_SERVICE_URL:-http://conversation-service:8002}
      SCHEDULER_SERVICE_URL: ${SCHEDULER_SERVICE_URL:-http://scheduler-service:8003}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001,http://localhost:3002}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/api-gateway:/app
      - ./backend/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  case-service:
    build:
      context: ./backend
      dockerfile: case-service/Dockerfile
    container_name: hci-case-service
    ports:
      - "8001:8001"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://hci_admin:dev_password_123@postgres:5432/hci_troubleshoot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/case-service:/app
      - ./backend/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  conversation-service:
    build:
      context: ./backend
      dockerfile: conversation-service/Dockerfile
    container_name: hci-conversation-service
    ports:
      - "8002:8002"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://hci_admin:dev_password_123@postgres:5432/hci_troubleshoot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://host.docker.internal:18790}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-hci-dev-openclaw-token}
      KB_SERVICE_URL: ${KB_SERVICE_URL:-http://kb-service:8004}
      KB_ENABLED: ${KB_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kb-service:
        condition: service_healthy
    volumes:
      - ./backend/conversation-service:/app
      - ./backend/shared:/app/shared
    command: uvicorn app.main:app --host 0.0.0.0 --port 8002 --reload

  scheduler-service:
    build:
      context: ./backend
      dockerfile: scheduler-service/Dockerfile
    container_name: hci-scheduler-service
    ports:
      - "8003:8003"
    environment:
      PYTHONPATH: /app
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      K8S_NAMESPACE: ${K8S_NAMESPACE:-hci-troubleshoot}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend/scheduler-service:/app
      - ./backend/shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock # For local dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8003 --reload

  kb-service:
    build:
      context: ./backend
      dockerfile: kb-service/Dockerfile
    container_name: hci-kb-service
    ports:
      - "8004:8004"
    environment:
      PYTHONPATH: /app
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://hci_admin:dev_password_123@postgres:5432/hci_troubleshoot}
      ZAI_BASE_URL: ${ZAI_BASE_URL:-http://host.docker.internal:18790}
      ZAI_API_KEY: ${ZAI_API_KEY:-hci-dev-openclaw-token}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-hci-dev-internal-token}
      SOP_SKILLS_DIR: /data/sop_skills
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/kb-service:/app
      - ./backend/shared:/app/shared
      - ./data-pipeline/sop_skills:/data/sop_skills:ro   # SOP 技能目录（只读）
      - ./data-pipeline/config:/data/config:ro            # jieba 词典等配置（只读）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload

  # ============ 前端服务 ============

  customer-ui:
    build:
      context: ./frontend
      dockerfile: customer/Dockerfile
    container_name: hci-customer-ui
    ports:
      - "3001:80"
    depends_on:
      - api-gateway

  admin-ui:
    build:
      context: ./frontend
      dockerfile: admin/Dockerfile
    container_name: hci-admin-ui
    ports:
      - "3002:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
  redis_data:
