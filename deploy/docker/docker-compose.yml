services:
  postgres:
    image: postgres:15-alpine
    container_name: hci-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hci_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-hci_troubleshoot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/init_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - hci-troubleshoot-platform_default

  redis:
    image: redis:7-alpine
    container_name: hci-redis
    ports:
      - "6379:6379"
    networks:
      - hci-troubleshoot-platform_default

  api-gateway:
    build:
      context: ../../backend
      dockerfile: api-gateway/Dockerfile
    volumes:
      - ../../backend/api-gateway:/app
      - ../../backend/shared:/app/shared
    container_name: hci-api-gateway
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CASE_SERVICE_URL=http://case-service:8001
      - CONVERSATION_SERVICE_URL=http://conversation-service:8002
    depends_on:
      - redis
    networks:
      - hci-troubleshoot-platform_default

  case-service:
    build:
      context: ../../backend
      dockerfile: case-service/Dockerfile
    volumes:
      - ../../backend/case-service:/app
      - ../../backend/shared:/app/shared
    container_name: hci-case-service
    ports:
      - "8001:8001"
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hci_admin:dev_password_123@postgres:5432/hci_troubleshoot}
    depends_on:
      - postgres
    networks:
      - hci-troubleshoot-platform_default

  conversation-service:
    build:
      context: ../../backend
      dockerfile: conversation-service/Dockerfile
    volumes:
      - ../../backend/conversation-service:/app
      - ../../backend/shared:/app/shared
    container_name: hci-conversation-service
    ports:
      - "8002:8002"
    env_file:
      - ../../.env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://hci_admin:dev_password_123@postgres:5432/hci_troubleshoot}
      - OPENCLAW_BASE_URL=http://openclaw:18789
    depends_on:
      - postgres
      - openclaw
    networks:
      - hci-troubleshoot-platform_default

  openclaw:
    build:
      context: ${OPENCLAW_REPO_DIR:-../../../../openclaw}
      dockerfile: Dockerfile
    container_name: hci-openclaw
    env_file:
      - ../../.env
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - OPENCLAW_SKIP_CANVAS_HOST=1
    volumes:
      - ${OPENCLAW_HOST_HOME:-/home/ubuntu}/.openclaw:/home/node/.openclaw
      - ${OPENCLAW_HOST_HOME:-/home/ubuntu}/.openclaw/workspace:/home/node/.openclaw/workspace
    expose:
      - "18789"
    networks:
      - hci-troubleshoot-platform_default
    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]

  picoclaw-adapter:
    build:
      context: ${AIBOT_ROOT_DIR:-../../..}
      dockerfile: hci-troubleshoot-platform/adapters/cli_openai_adapter/Dockerfile.picoclaw
    container_name: hci-picoclaw-adapter
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - ADAPTER_HOST=0.0.0.0
      - ADAPTER_PORT=43101
      - ADAPTER_MODEL=picoclaw
      - ADAPTER_BEARER_TOKEN=pc_dev_token
      - ADAPTER_RESPONSE_PREFIX=🦞
      - PICOCLAW_UPSTREAM_BASE_URL=http://openclaw:18789/v1
      - PICOCLAW_UPSTREAM_MODEL=openclaw
    ports:
      - "43101:43101"
    volumes:
      - picoclaw_data:/root/.picoclaw
    networks:
      - hci-troubleshoot-platform_default

  nanobot-adapter:
    build:
      context: ${AIBOT_ROOT_DIR:-../../..}
      dockerfile: hci-troubleshoot-platform/adapters/cli_openai_adapter/Dockerfile.nanobot
    container_name: hci-nanobot-adapter
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - ADAPTER_HOST=0.0.0.0
      - ADAPTER_PORT=43102
      - ADAPTER_MODEL=nanobot
      - ADAPTER_BEARER_TOKEN=nb_dev_token
      - NANOBOT_UPSTREAM_BASE_URL=http://openclaw:18789/v1
      - NANOBOT_UPSTREAM_MODEL=openclaw
    ports:
      - "43102:43102"
    volumes:
      - nanobot_data:/root/.nanobot
    depends_on:
      - openclaw
    networks:
      - hci-troubleshoot-platform_default

  nanoclaw-adapter:
    build:
      context: ${AIBOT_ROOT_DIR:-../../..}
      dockerfile: hci-troubleshoot-platform/adapters/cli_openai_adapter/Dockerfile.nanoclaw
    container_name: hci-nanoclaw-adapter
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      - ADAPTER_HOST=0.0.0.0
      - ADAPTER_PORT=43103
      - ADAPTER_MODEL=nanoclaw
      - ADAPTER_BEARER_TOKEN=nc_dev_token
      - NANOCLAW_NATIVE_TIMEOUT_SEC=300
    ports:
      - "43103:43103"
    volumes:
      - nanoclaw_native_data:/home/node/.nanoclaw-native
      - nanoclaw_workspace:/workspace
      - ${CLAUDE_HOST_HOME:-/home/ubuntu}/.claude:/home/node/.claude
      - ${CLAUDE_HOST_HOME:-/home/ubuntu}/.claude.json:/home/node/.claude.json:ro
    networks:
      - hci-troubleshoot-platform_default

  scheduler-service:
    build:
      context: ../../backend
      dockerfile: scheduler-service/Dockerfile
    volumes:
      - ../../backend/scheduler-service:/app
      - ../../backend/shared:/app/shared
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: hci-scheduler-service
    ports:
      - "8003:8003"
    env_file:
      - ../../.env
    networks:
      - hci-troubleshoot-platform_default

volumes:
  postgres_data:
  picoclaw_data:
  nanobot_data:
  nanoclaw_native_data:
  nanoclaw_workspace:

networks:
  hci-troubleshoot-platform_default:
    external: true
