apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: hci-observability
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics-hci
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
rules:
  - apiGroups: [""]
    resources:
      - pods
      - nodes
      - namespaces
      - services
      - configmaps
      - resourcequotas
      - replicationcontrollers
      - persistentvolumeclaims
      - persistentvolumes
      - limitranges
      - endpoints
      - events
      - secrets
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["list", "watch"]
  - apiGroups: ["policy"]
    resources:
      - poddisruptionbudgets
    verbs: ["list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
      - ingressclasses
    verbs: ["list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics-hci
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics-hci
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: hci-observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: hci-observability
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-state-metrics
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: hci-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: m.daocloud.io/registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.13.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: hci-observability
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
---
# alertmanager-config Secret 由 Helm chart hci-platform-obs 渲染（templates/secrets.yaml）
# 飞书 Webhook URL 通过 hci-platform-env 环境仓库 secrets.feishuWebhookUrl 字段注入
# 此处不再硬编码，请勿在此文件中添加 alertmanager-config Secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: hci-observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/component: observability
        app.kubernetes.io/part-of: hci-platform
    spec:
      containers:
        - name: alertmanager
          image: quay.io/prometheus/alertmanager:v0.27.0
          imagePullPolicy: IfNotPresent
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - name: web
              containerPort: 9093
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
      # PIT-034: Clash fake-IP (198.18.x.x) 通过 bypass rule 让 Pod 走 main 路由无法到达
      # Alertmanager 只需发外部 webhook，无需 K8s 内部服务发现，使用真实 DNS 绕开 Clash fake-IP
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 114.114.114.114
          - 1.2.4.8
        options:
          - name: ndots
            value: "1"
      volumes:
        - name: config
          secret:
            secretName: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: hci-observability
  labels:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/component: observability
    app.kubernetes.io/part-of: hci-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: web
      port: 9093
      targetPort: 9093
      protocol: TCP
