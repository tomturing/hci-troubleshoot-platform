# =============================================================================
# ArgoCD repo-server Probe 优化 — PreSync Hook
#
# 问题根因：
#   ArgoCD directory 模式不支持 StrategicMergePatch，需要通过 kubectl patch 应用
#
# 解决方案：
#   使用 PreSync Hook Job 执行 kubectl patch，应用 probe 配置变更
#
# Probe 策略：
#   - liveness probe → /healthz（只检查进程存活，timeout 5秒）
#   - readiness probe → /healthz?full=true（检查功能可用，timeout 60秒）
#
# 注意：env 变量（REDIS_PASSWORD、ARGOCD_EXEC_TIMEOUT、dnsPolicy）
#   由 scripts/ops/argocd-upgrade.sh post_upgrade_patch() 函数在升级时注入，
#   不在此 PreSync Job 中处理，避免每次 Sync 重复 append 导致 env 数组膨胀。
#
# 变更历史：
#   2026-04-17 v1.0 初版（PR #168 → PR #169 修复）
#   2026-04-21 v1.1 修复镜像不含 kubectl 问题（PR #195 → bitnami/kubectl:1.31 无效）
#   2026-04-21 v1.2 修复无效镜像版本（rancher/kubectl:v1.32.13）
#
# 避坑指南：D-005（docs/deploy/pitfalls/k8s.md）
# 参考：docs/deploy/events/2026-04-17-argocd-repo-server-probe-优化.md
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: argocd-repo-server-probe-patch
  namespace: argocd
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: argocd-repo-server-watchdog
      restartPolicy: Never
      activeDeadlineSeconds: 120  # 超时保护，防止 Job 无限等待
      containers:
        - name: patch
          # D-005：PreSync Hook 需使用包含目标工具的镜像
          # rancher/kubectl 包含完整 kubectl，版本 ≤ 集群版本（1.32 ≤ 1.34）
          # 注意：bitnami/kubectl 镜像使用 sha256 标签而非版本号标签，不便引用
          image: rancher/kubectl:v1.32.13
          imagePullPolicy: IfNotPresent
          resources:  # 资源限制，防止占用过多资源
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "[PROBE-PATCH] 开始应用 ArgoCD repo-server probe 配置..."

              # 应用 StrategicMergePatch
              kubectl patch deployment argocd-repo-server -n argocd --type='json' -p='[
                {
                  "op": "replace",
                  "path": "/spec/template/spec/containers/0/livenessProbe/httpGet/path",
                  "value": "/healthz"
                },
                {
                  "op": "replace",
                  "path": "/spec/template/spec/containers/0/livenessProbe/timeoutSeconds",
                  "value": 5
                },
                {
                  "op": "replace",
                  "path": "/spec/template/spec/containers/0/readinessProbe/httpGet/path",
                  "value": "/healthz?full=true"
                },
                {
                  "op": "replace",
                  "path": "/spec/template/spec/containers/0/readinessProbe/timeoutSeconds",
                  "value": 60
                }
              ]'

              # 并行度限制通过 ConfigMap 设置（幂等，避免每次 Sync append env 数组）
              kubectl patch cm argocd-cmd-params-cm -n argocd --type merge \
                -p '{"data":{"reposerver.parallelism.limit":"4"}}'

              echo "[PROBE-PATCH] ✓ Probe 配置已应用，等待 Deployment rollout..."

              # 等待 rollout 完成
              kubectl rollout status deployment/argocd-repo-server -n argocd --timeout=120s

              echo "[PROBE-PATCH] ✓ Deployment rollout 完成"