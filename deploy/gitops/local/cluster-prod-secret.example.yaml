# =============================================================================
# ArgoCD 外部集群注册 Secret（prod 集群）
#
# 用途：将 prod 集群（192.168.0.3）注册到运行在 staging 的 ArgoCD，
#       实现 hub-spoke 模式统一管理。
#
# 使用方法：
#   1. 复制此文件为正式文件（.gitignore 已忽略 *.yaml）：
#        cp deploy/gitops/local/cluster-prod-secret.example.yaml \
#           deploy/gitops/local/cluster-prod-secret.yaml
#   2. 将所有 <REPLACE_ME> 替换为真实值
#   3. 应用到 ArgoCD 所在集群（staging）：
#        kubectl apply -f deploy/gitops/local/cluster-prod-secret.yaml -n argocd
#   4. 验证注册成功：
#        argocd cluster list
#        # 期望：https://192.168.0.3:6443  STATUS=Successful
#
# 替代方案（推荐）：
#   使用 argocd CLI 注册（自动处理 TLS 证书）：
#     argocd login 192.168.0.4:30808 --username admin --password <password> --insecure
#     argocd cluster add <prod-kubeconfig-context> --name prod-cluster --insecure
#   CLI 注册后，ArgoCD 自动创建等价的 Secret。
#
# 注意：
#   - bearerToken 需具有 cluster-admin 或等价权限
#   - caData 为 prod 集群 kube-apiserver CA 证书（base64 编码）
#   - 本文件绝不可提交到 Git（.gitignore 已配置 local/*.yaml）
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: cluster-prod-192-168-0-3
  namespace: argocd
  labels:
    # ArgoCD 识别为外部集群凭据
    argocd.argoproj.io/secret-type: cluster
  annotations:
    argocd.argoproj.io/description: "prod 集群（192.168.0.3）hub-spoke 注册 Secret"
type: Opaque
stringData:
  name: prod-cluster
  server: https://192.168.0.3:6443
  config: |
    {
      "bearerToken": "<REPLACE_ME: prod 集群 ServiceAccount token，需 cluster-admin 权限>",
      "tlsClientConfig": {
        "insecure": false,
        "caData": "<REPLACE_ME: base64(prod 集群 /etc/kubernetes/pki/ca.crt)>"
      }
    }
