apiVersion: v1
kind: Secret
metadata:
  name: argocd-repo-creds-github-tomturing
  namespace: argocd
  labels:
    # Argo CD 识别为仓库凭据模板（按 URL 前缀匹配）
    argocd.argoproj.io/secret-type: repo-creds
type: Opaque
stringData:
  url: https://github.com/tomturing
  type: git
  # username 建议填写 GitHub 用户名
  username: tomturing
  # password 填写 PAT（仅用于 Argo 读仓库）
  # 推荐 Fine-grained PAT：
  # - Repository access: 仅选择 hci-troubleshoot-platform + hci-platform-env
  # - Repository permissions:
  #   * Contents: Read-only
  #   * Metadata: Read-only
  # 若使用 Classic PAT，至少需要: repo（私有仓库读取）
  password: <github_pat>