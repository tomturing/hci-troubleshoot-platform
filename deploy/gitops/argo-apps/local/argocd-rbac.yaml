# =============================================================================
# ArgoCD Application: argocd-rbac
#
# 职责：
#   argocd-repo-server-watchdog 的 RBAC 资源（ServiceAccount + Role + RoleBinding）
#
# 设计原则：
#   - 无 Hook，纯声明式资源 → ArgoCD 可自动自愈
#   - prune: false → RBAC 资源不随 Git 删除而自动删除（安全保留）
#
# 同步顺序控制：
#   通过 argocd.argoproj.io/sync-wave annotation 控制 App of Apps 中的同步顺序：
#   - argocd-rbac: sync-wave: -1（先于 argocd-ops 同步）
#   - argocd-ops: sync-wave: 0（默认）
#   确保 PreSync Job 执行时 RBAC 权限已就绪
#
# 依赖关系：
#   argocd-rbac → argocd-ops（PreSync Job 需要 Role 权限）
#
# 迁移说明：
#   从旧状态（RBAC 在 argocd-ops 内）迁移时，需先手动 apply RBAC 资源：
#   kubectl apply -f deploy/gitops/argocd-rbac/
#   然后触发 argocd-ops 同步，避免权限不足导致的失败重试。
#
# 变更历史：
#   2026-04-22 v1.0 初版，从 argocd-ops 拆分解决同步顺序依赖
#   2026-04-22 v1.1 添加 sync-wave annotation，修复 RBAC verbs
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-rbac
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # 先于 argocd-ops 同步
    argocd.argoproj.io/description: "argocd-repo-server-watchdog RBAC — 无 Hook，可自动自愈"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
    targetRevision: main
    path: deploy/gitops/argocd-rbac
    directory:
      recurse: false
  syncPolicy:
    automated:
      prune: false  # RBAC 资源安全保留，不自动删除
      selfHeal: true  # 防止手动修改后漂移
    syncOptions:
      - CreateNamespace=false  # argocd namespace 已存在