# =============================================================================
# ArgoCD Application: hci-platform-data-dev
#
# 管理 dev 环境数据层（namespace: hci-dev）：
#   - PostgreSQL StatefulSet + Headless Service + init ConfigMap + 备份 CronJob
#   - Redis StatefulSet + Headless Service
#
# ⚠️  安全策略：
#   - prune: false — 禁止 ArgoCD 自动删除数据层资源，PVC 受双重保护
#   - selfHeal: true — 防止手动误改被保留
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hci-platform-data-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/description: "dev 数据层 — PostgreSQL + Redis（namespace: hci-dev）"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hci-dev
  sources:
    - repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
      targetRevision: main
      path: deploy/helm/hci-platform-data
      helm:
        releaseName: hci-platform-data
  # StatefulSet 的 volumeClaimTemplates 字段创建后不可变，
  # 修改 storageClass 等属性会导致 ArgoCD 反复尝试 patch 并 SyncFailed，
  # 故整体忽略 volumeClaimTemplates 差异，StorageClass 变更须人工手动重建 PVC
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: postgres
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: apps
      kind: StatefulSet
      name: redis
      jsonPointers:
        - /spec/volumeClaimTemplates
  syncPolicy:
    automated:
      prune: false      # 禁止自动删除数据层资源，PVC 安全第一
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true   # sync 阶段同样跳过 ignoreDifferences 中声明的字段
