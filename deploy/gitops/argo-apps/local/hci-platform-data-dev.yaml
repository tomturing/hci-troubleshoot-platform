# =============================================================================
# ArgoCD Application: hci-platform-data-dev
#
# 管理 dev 环境数据层（namespace: hci-dev）：
#   - PostgreSQL StatefulSet + Headless Service + init ConfigMap + 备份 CronJob
#   - Redis StatefulSet + Headless Service
#
# ⚠️  安全策略：
#   - prune: false — 禁止 ArgoCD 自动删除数据层资源，PVC 受双重保护
#   - selfHeal: true — 防止手动误改被保留
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hci-platform-data-dev
  namespace: argocd
  annotations:
    argocd.argoproj.io/description: "dev 数据层 — PostgreSQL + Redis（namespace: hci-dev）"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: hci-dev
  sources:
    - repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
      targetRevision: main
      path: deploy/helm/hci-platform-data
      helm:
        releaseName: hci-platform-data
  syncPolicy:
    automated:
      prune: false      # 禁止自动删除数据层资源，PVC 安全第一
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # 忽略 StatefulSet 不可变字段差异（K8s 自动注入，Helm 模板未显式设置）
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/podManagementPolicy
        - /spec/revisionHistoryLimit
        - /spec/persistentVolumeClaimRetentionPolicy
