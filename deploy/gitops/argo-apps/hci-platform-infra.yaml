# =============================================================================
# ArgoCD Application: hci-platform-infra
#
# 管理集群级基础设施资源（无 namespace）：
#   - StorageClass: local-path-retain
#   - ClusterRole/ClusterRoleBinding: prometheus-hci
#   - ClusterRole/ClusterRoleBinding: promtail
#
# 设计原则：
#   - 仅部署一次，三个环境（dev/staging/prod）共用同一份集群级资源
#   - 独立 Application 独占所有权，消除多 Application 竞争覆写同名对象的风险
#   - destination.namespace 留空，让各资源自身决定作用域
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hci-platform-infra
  namespace: argocd
  annotations:
    # 说明：此 Application 管理的是集群级资源，不属于任何业务环境
    argocd.argoproj.io/description: "集群级基础设施资源 - StorageClass + RBAC（三环境共用）"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ""   # 集群级资源不绑定 namespace，由各资源模板自身决定
  sources:
    - repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
      targetRevision: main
      path: deploy/helm/hci-platform-infra
      helm:
        releaseName: hci-platform-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true   # 避免 ClusterRole rules 字段被 last-apply 注解截断
