# =============================================================================
# ArgoCD Application: hci-platform-infra-staging
#
# 目标集群：云端 staging VM（kubernetes.default.svc = ArgoCD 所在集群）
# 管理集群级基础设施资源（无 namespace）：
#   - StorageClass: local-path-retain
#   - ClusterRole/ClusterRoleBinding: prometheus-hci
#   - ClusterRole/ClusterRoleBinding: promtail
#
# 设计原则：
#   - staging 集群独立一份，与 prod 集群隔离
#   - destination.namespace 留空，让各资源模板自身决定作用域
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hci-platform-infra-staging
  namespace: argocd
  annotations:
    argocd.argoproj.io/description: "staging 集群级基础设施 - StorageClass + RBAC"
spec:
  project: default
  destination:
    # staging 集群：云端 ArgoCD 所在 VM（kubernetes.default.svc = 本机集群）
    server: https://kubernetes.default.svc
    namespace: ""   # 集群级资源不绑定 namespace
  sources:
    - repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
      targetRevision: main
      path: deploy/helm/hci-platform-infra
      helm:
        releaseName: hci-platform-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true   # 避免 ClusterRole rules 字段被 last-apply 注解截断
