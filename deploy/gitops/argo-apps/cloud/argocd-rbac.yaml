# =============================================================================
# ArgoCD Application: argocd-rbac
#
# 职责：
#   argocd-repo-server-watchdog 的 RBAC 资源（ServiceAccount + Role + RoleBinding）
#
# 设计原则：
#   - 无 Hook，纯声明式资源 → ArgoCD 可自动自愈
#   - prune: false → RBAC 资源不随 Git 删除而自动删除（安全保留）
#
# 同步顺序控制：
#   通过 argocd.argoproj.io/sync-wave annotation 控制同步顺序：
#   - sync-wave: -1 → argocd-rbac 先同步，确保 SA/Role 就绪
#   - sync-wave: 0 → argocd-ops 后同步，PreSync Job 可正常执行
#
# 依赖关系：
#   argocd-rbac (sync-wave: -1) → argocd-ops (sync-wave: 0)
#   PreSync Job 需要 argocd-repo-server-watchdog ServiceAccount
#
# 变更历史：
#   2026-04-26 v1.0 初版，从argo-apps/cloud/添加，统一dev/staging架构
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-rbac
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"  # 先于 argocd-ops 同步
    argocd.argoproj.io/description: "argocd-repo-server-watchdog RBAC — 无 Hook，可自动自愈"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
    targetRevision: main
    path: deploy/gitops/argocd-rbac
  syncPolicy:
    automated:
      prune: false  # RBAC 资源安全保留，不自动删除
      selfHeal: true  # 防止手动修改后漂移
    syncOptions:
      - CreateNamespace=false  # argocd namespace 已存在