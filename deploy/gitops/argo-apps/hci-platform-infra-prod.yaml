# =============================================================================
# ArgoCD Application: hci-platform-infra-prod
#
# 管理 prod 集群级基础设施资源（无 namespace）：
#   - StorageClass: local-path-retain
#   - ClusterRole/ClusterRoleBinding: prometheus-hci
#   - ClusterRole/ClusterRoleBinding: promtail
#
# 设计原则：
#   - prod 集群独立 VM（192.168.0.3），需独立部署一次集群级资源
#   - 与 hci-platform-infra.yaml 使用同一 Chart，仅 destination 不同
#   - destination.namespace 留空，让各资源自身决定作用域
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hci-platform-infra-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/description: "prod 集群级基础设施资源 - StorageClass + RBAC（192.168.0.3）"
spec:
  project: default
  destination:
    # prod 集群独立 VM，ArgoCD 通过内网 API Server 管理
    server: https://192.168.0.3:6443
    namespace: ""   # 集群级资源不绑定 namespace，由各资源模板自身决定
  sources:
    - repoURL: https://github.com/tomturing/hci-troubleshoot-platform.git
      targetRevision: main
      path: deploy/helm/hci-platform-infra
      helm:
        releaseName: hci-platform-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true   # 避免 ClusterRole rules 字段被 last-apply 注解截断
