services:
  loki:
    image: grafana/loki:latest
    container_name: hci-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - hci-troubleshoot-platform_default

  promtail:
    image: grafana/promtail:latest
    container_name: hci-promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./config/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - hci-troubleshoot-platform_default
    depends_on:
      - loki

  tempo:
    image: grafana/tempo:2.6.1
    container_name: hci-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./config/tempo-config.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"   # Tempo query frontend
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    networks:
      - hci-troubleshoot-platform_default

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: hci-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - hci-troubleshoot-platform_default

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: hci-alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - WECOM_WEBHOOK_URL=${WECOM_WEBHOOK_URL:-}
    volumes:
      - ./config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - hci-troubleshoot-platform_default
    depends_on:
      - prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: hci-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - hci-troubleshoot-platform_default
    depends_on:
      - loki
      - tempo
      - prometheus

volumes:
  prometheus_data:

networks:
  hci-troubleshoot-platform_default:
    external: true
