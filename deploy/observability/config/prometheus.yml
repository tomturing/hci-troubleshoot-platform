global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'hci-troubleshoot-platform'

# 加载告警规则文件
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  # Conversation Service - AI TTFT 指标、请求计数
  - job_name: 'conversation-service'
    static_configs:
      - targets: ['conversation-service:8002']
    metrics_path: '/metrics'

  # Scheduler Service - Pod 池空闲/活跃数
  - job_name: 'scheduler-service'
    static_configs:
      - targets: ['scheduler-service:8003']
    metrics_path: '/metrics'

  # API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:8000']
    metrics_path: '/metrics'

  # Case Service
  - job_name: 'case-service'
    static_configs:
      - targets: ['case-service:8001']
    metrics_path: '/metrics'

  # Prometheus 自身
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # KB Service
  - job_name: 'kb-service'
    static_configs:
      - targets: ['kb-service:8004']
    metrics_path: '/metrics'

  # ────────────────────────────────────────
  # 以下为可选项：部署对应 exporter 后取消注释即可生效
  # 修复 #7：说明 node-exporter/kube-state-metrics 需单独部署才能启用
  # ────────────────────────────────────────

  # Node Exporter （内存/磁盘告警依赖）
  # 先在 K3s 上部署：https://github.com/prometheus/node_exporter
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # Kube State Metrics （Pod 重启计数告警依赖）
  # 先在 K3s 上部署：https://github.com/kubernetes/kube-state-metrics
  # - job_name: 'kube-state-metrics'
  #   static_configs:
  #     - targets: ['kube-state-metrics:8080']
