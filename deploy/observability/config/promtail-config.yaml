server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 2s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "logstream"
      - source_labels:
          ["__meta_docker_container_label_com_docker_compose_project"]
        target_label: "project"
    # 修复 #4：添加 JSON pipeline，提取结构化字段
    # trace_id 仅解析不升为 label（避免每请求一条 stream 的高基数问题）
    # Trace→Log 联动通过 Grafana Tempo datasource 的 tracesToLogsV2 customQuery 实现：
    #   {container="$container"} | json | trace_id="$traceId"
    pipeline_stages:
      - docker: {}         # 解析 Docker JSON 外层（timestamp/log/stream）
      - json:
          expressions:
            level: level
            service: service
      - labels:
          level:
          service:
