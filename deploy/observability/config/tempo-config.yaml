stream_over_http_enabled: true
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 1m

metrics_generator:
  registry:
    external_labels:
      source: tempo
      cluster: hci-local
  # 修复 #10：将 span-metrics/service-graph 写入 Prometheus
  # remote_write 必须置于 metrics_generator 块下，而非顶层 storage 块
  storage:
    path: /var/tempo/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks   # 修复 #3：从 /tmp 改为持久化目录，并配合 volume 挂载

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
